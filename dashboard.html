.up { color: var(--red); }

tock_market": "", "is_a_share": false, "source": "", "url": "https://news.10jqka.com.cn/20260330/c675629532.shtml"}, {"id": "4160777", "title": "驻越南大使何炜会见嘉莱省委书记蔡大玉", "content": "2026年3月27日，驻越南大使何炜在嘉莱省会见越共中央委员、嘉莱省委书记蔡大玉和人委会主席范英俊，驻岘港总领事董碧幽等在座。何炜大使表示，这两年中越关系高歌猛进，两国全面战略合作步入最富活力、最具潜力的新阶段。希望嘉莱省搭上中越合作的时代列车，充分发挥自然资源禀赋，用好越南“国家旅游年”品牌效应，积极对接中国大市场，探索两国地方经贸与文旅合作新模式，为中越命运共同体建设添砖加瓦。蔡表示，当前越中关系迈上前所未有新高度，两国地方合作面临广阔前景。嘉莱省愿按照两党最高领导人指明的战略方向，积极挖掘两国地方合作新契合点，深化特色旅游、高科技农业、人文教育、数字化转型等领域合作，为越中命运共同体建设贡献更多地方力量。(外交部)", "ctime": 1774853897, "time_str": "14:58:17", "stock_code": "", "stock_name": "", "stock_market": "", "is_a_share": false, "source": "", "url": "https://news.10jqka.com.cn/20260330/c675629473.shtml"}, {"id": "4160769", "title": "湖南澧阳平原灌区改造工程开工建设", "content": "今天（30日）上午，湖南今年首个重大水利工程，澧阳平原灌区续建配套与现代化改造工程在湖南常德澧县开工建设。澧阳平原灌区位于湘北澧水中下游平原，是湖南重要的粮食产区。设计灌溉面积40.49万亩。由于现有部分水利设施建成年限已久，存在工程设施老化，输水效率低等问题。作为国家“两重”建设实施方案重大水利工程之一，工程总投资4.86亿元，主要建设项目涵盖排水沟改造、灌区信息化建设等内容。工程建成后，预计可恢复改善灌溉面积34.99万亩，每年增产粮食5200万斤。（央视新闻）", "ctime": 1774853699, "time_str": "14:54:59", "stock_code": "", "stock_name": "", "stock_market": "", "is_a_share": false, "source": "", "url": "https://news.10jqka.com.cn/20260330/c675629391.shtml"}, {"id": "4160763", "title": "对伊战事支持率下降，以色列多地现反战抗议", "content": "随着针对伊朗的军事行动持续，以色列国内民众对战事的支持率下降，尤其是“强烈支持”战事的民众比例与3月初相比明显下降。以色列民主研究所民意调查于本月22日至26日进行，受访者为756名18岁以上以色列人，包括犹太裔及阿拉伯裔。近几天，以色列“和平伙伴计划”等数十个和平组织首次联合，抗议以政府发动“无休止的战争”。28日在中部城市特拉维夫哈比玛广场的反战抗议活动有超过1000人参加，系一个月以来最大规模。一些抗议者表示，活动“刚开始数分钟”，警方开始让人群散开，理由是“为了你们的安全”。消息称，军警冲入人群并开始驱赶抗议者，导致多人跌倒在地，现场活动随后演变为冲突。截至29日，特拉维夫及北部城市海法已有约20名抗议者遭以色列警方逮捕。（央视新闻）", "ctime": 1774853541, "time_str": "14:52:21", "stock_code": "", "stock_name": "", "stock_market": "", "is_a_share": false, "source": "", "url": "https://news.10jqka.com.cn/20260330/c675629325.shtml"}, {"id": "4160747", "title": "泽连斯基称俄罗斯向伊朗提供中东美军卫星图像", "content": "乌克兰总统泽连斯基日前接受美国媒体采访时称，他“百分百”确信，俄罗斯与伊朗共享卫星图像等情报，协助后者打击中东地区的美军目标。泽连斯基28日在卡塔尔接受美国全国广播公司采访时作上述指称。他说，乌克兰情报显示，沙特阿拉伯的苏丹王子空军基地26日遭遇空袭前，俄罗斯卫星于3月20日、23日和25日三次拍摄该基地图像。两名美国政府官员27日披露，该基地部分美军士兵遇袭受伤，但伤情不危及生命。（新华社）", "ctime": 1774853381, "time_str": "14:49:41", "stock_code": "", "stock_name": "", "stock_market": "", "is_a_share": false, "source": "", "url": "https://news.10jqka.com.cn/20260330/c675629281.shtml"}, {"id": "4160745", "title": "现货黄金站上4550美元/盎司", "content": "现货黄金站上4550美元/盎司，日内涨1.28%。", "ctime": 1774853380, "time_str": "14:49:40", "stock_code": "", "stock_name": "", "stock_market": "", "is_a_share": false, "source": "", "url": "https://news.10jqka.com.cn/20260330/c675629280.shtml"}, {"id": "4160741", "title": "日本参议院预算委员会通过2026财年临时预算案", "content": "当地时间3月30日，日本参议院预算委员会表决通过2026财年临时预算案。为避免政府运转因预算无法接续陷入困境，日本内阁本月27日批准一项临时预算案，并提交国会审议。这一临时预算案总额约为8.56万亿日元，涵盖对地方的转移支付、社保相关费用、公务员工资、高中学费补贴等开支，以维持政府正常运转11天。日本首相高市早苗今年1月突然宣布解散众议院、提前举行大选，国会两院对将于4月1日开启的2026财年预算案进行审议的日程被迫延迟约1个月。（央视新闻）", "ctime": 1774853305, "time_str": "14:48:25", "stock_code": "", "stock_name": "", "stock_market": "", "is_a_share": false, "source": "", "url": "https://news.10jqka.com.cn/20260330/c675629244.shtml"}, {"id": "4160731", "title": "常驻联合国日内瓦办事处和瑞士其他国际组织代表贾桂德大使在人权理事会谴责美国、以色列袭击伊朗学校暴行", "content": "2026年3月27日，应伊朗、中国、古巴要求，联合国人权理事会第61届会议就伊朗米纳卜小学遭受袭击举行紧急辩论。常驻联合国日内瓦办事处和瑞士其他国际组织代表贾桂德大使出席并阐述中方立场。贾桂德大使表示，伊朗米纳卜小学遭袭，168名花季女童鲜活的生命被剥夺，这一暴行突破人类道德良知底线，是对人权的最大侵犯，是对国际人道法的公然蔑视，中方对此深感震惊、严厉谴责，对遇难者家属的悲痛感同身受。贾大使指出，美国和以色列未经安理会授权，悍然对伊朗发动袭击，是造成这一悲剧的根源。美以不仅杀害伊领导人，严重侵犯伊人民人权，还引发中东地区冲突升级，地区国家被迫卷入其中。所有国家的主权、安全和领土完整应当得到充分尊重。中方强烈谴责一切违反国际法、无差别攻击平民和非军事目标的行为。贾大使强调，所有热点问题都应通过对话谈判解决，而不应使用武力，各方应抓住一切和平机会和窗口，以真诚的态度启动和谈进程，用实际行动保护地区人民的基本人权，维护中东地区的和平稳定。(外交部)", "ctime": 1774853199, "time_str": "14:46:39", "stock_code": "", "stock_name": "", "stock_market": "", "is_a_share": false, "source": "", "url": "https://news.10jqka.com.cn/20260330/c675629199.shtml"}, {"id": "4160719", "title": "优化离境退税2.0版措施即将推出 “购在中国”提质升级", "content": "在今天（3月30日）国务院新闻办举行的新闻发布会上，商务部有关负责人表示，将出台优化离境退税、商品扩容升级等多项措施，推动“购在中国”持续升温。政策支持方面，有关部门将推出优化离境退税2.0版措施，让境外旅客购物更便利、更实惠，出台推动商品消费扩容升级的措施，扩大国货潮品、国际精品、时尚名品、外贸优品等消费。活动安排方面，将举办国际消费季、精品消费月等20多场重点活动，组织“购在中国”城市专场和地方站活动，指导各地统筹商旅文体健资源，满足多元化消费需求。此外，商务部还将深化国际消费中心城市培育建设，打造一批国际消费集聚区。开展消费新业态新模式新场景试点，打造一批体验感强、带动面广、显示度高的消费新场景。（央视新闻）", "ctime": 1774853020, "time_str": "14:43:40", "stock_code": "", "stock_name": "", "stock_market": "", "is_a_share": false, "source": "", "url": "https://news.10jqka.com.cn/20260330/c675629129.shtml"}, {"id": "4160711", "title": "通用异构智能CPU芯片企业此芯科技完成近十亿元B轮融资", "content": "通用异构智能CPU芯片企业此芯科技宣布完成近十亿元人民币B轮融资。本轮融资由上海市、区两级国资平台上海IC基金和浦东创投联合领投，老股东联想创投、同歌创投、元禾璞华持续加注，余姚阳明基金和宁波维斯塔、致凯资本及福州新投创投、福州榕投资本、复旦科创及社会化资本跟投。该轮融资将重点用于现有产品的规模化商用及下一代高性能智能体CPU的研发与量产，加速智能体终端生态构建。（财联社）", "ctime": 1774852898, "time_str": "14:41:38", "stock_code": "", "stock_name": "", "stock_market": "", "is_a_share": false, "source": "", "url": "https://news.10jqka.com.cn/20260330/c675629100.shtml"}, {"id": "4160705", "title": "纽约期金站上4570美元/盎司", "content": "纽约期金站上4570美元/盎司，日内涨1.01%。", "ctime": 1774852846, "time_str": "14:40:46", "stock_code": "", "stock_name": "", "stock_market": "", "is_a_share": false, "source": "", "url": "https://news.10jqka.com.cn/20260330/c675629089.shtml"}, {"id": "4160697", "title": "美参议员谈美以伊战事：不应再资助“非法战争”", "content": "美国民主党籍参议员克里斯·范霍伦29日在接受美国广播公司《本周》节目采访时说，不应为一场“非法战争”提供资金。他指出，美国总统特朗普在竞选期间曾承诺不会将美国拖入新的战争，尤其是在中东地区，而美以伊战事已经让美国人“付出了生命代价，每天耗费数十亿美元”。(新华社)", "ctime": 1774852717, "time_str": "14:38:37", "stock_code": "", "stock_name": "", "stock_market": "", "is_a_share": false, "source": "", "url": "https://news.10jqka.com.cn/20260330/c675629054.shtml"}, {"id": "4160685", "title": "现货黄金涨超1% 站上4540美元/盎司关口", "content": "现货黄金涨超1%，站上4540美元/盎司关口。", "ctime": 1774852531, "time_str": "14:35:31", "stock_code": "", "stock_name": "", "stock_market": "", "is_a_share": false, "source": "", "url": "https://news.10jqka.com.cn/20260330/c675629011.shtml"}, {"id": "4160677", "title": "人工智能技术赋能生态环境治理", "content": "在监测方面，人工智能技术已逐步嵌入生态环境监测并实现业务化应用。以生物多样性识别为例，通过鸟类图像声纹识别、植物物种图像智能识别等技术，过去一年才能完成一次的鸟类、植物种类调查，现在全年都可以连续进行。在环境执法方面，融合了排污许可数据的智能执法技术，能够自动生成执法线索。在监管方面，人工智能技术大大提升了非现场执法能力。目前，国家科技重大项目已部署90多个涉及人工智能等新技术的研究项目。下一步，生态环境部将持续加大对人工智能相关技术研发的支持，加快建设天空地海一体化的智能监测网络，让“人工智能+”为美丽中国建设贡献更多力量。（央视新闻）", "ctime": 1774852487, "time_str": "14:34:47", "stock_code": "", "stock_name": "", "stock_market": "", "is_a_share": false, "source": "", "url": "https://news.10jqka.com.cn/20260330/c675628987.shtml"}, {"id": "4160663", "title": "豆包已接入抖音电商 内测AI购物", "content": "记者注意到，字节豆包已经接入抖音电商，支持在豆包APP内直接下单商品并完成支付，无需跳转抖音。据了解，该功能正在内测中。（科创板日报）", "ctime": 1774852382, "time_str": "14:33:02", "stock_code": "", "stock_name": "", "stock_market": "", "is_a_share": false, "source": "", "url": "https://news.10jqka.com.cn/20260330/c675628947.shtml"}, {"id": "4160651", "title": "日韩股市集体收跌", "content": "日经225指数收跌2.79%，报51885.85点。韩国综指收跌2.97%，报5277.30点。", "ctime": 1774852294, "time_str": "14:31:34", "stock_code": "", "stock_name": "", "stock_market": "", "is_a_share": false, "source": "", "url": "https://news.10jqka.com.cn/20260330/c675628916.shtml"}, {"id": "4160631", "title": "巴基斯坦 KSE-100 指数下跌 4%，报 145,663 点", "content": "巴基斯坦 KSE-100 指数下跌 4%，报 145,663 点。", "ctime": 1774852031, "time_str": "14:27:11", "stock_code": "", "stock_name": "", "stock_market": "", "is_a_share": false, "source": "", "url": "https://news.10jqka.com.cn/20260330/c675628820.shtml"}, {"id": "4160627", "title": "北京市商务局发布《北京市会展业高质量发展三年行动方案（2026-2028年）》", "content": "北京市商务局发布《北京市会展业高质量发展三年行动方案（2026-2028年）》，旨在提升北京会展业的国际竞争力和服务水平。方案提出五大目标，包括优化场馆布局、增强国际竞争力、提升品牌知名度、促进相关产业联动发展及改善营商环境。为实现这些目标，方案部署了五大重点行动和24项具体举措，如打造特色会展产业集聚区、发展国际化标杆企业、强化重点项目保障、推进“会展+”融合赋能以及完善支撑服务。通过这些措施，北京将构建符合首都战略定位的会展业高质量发展新格局。", "ctime": 1774851973, "time_str": "14:26:13", "stock_code": "", "stock_name": "", "stock_market": "", "is_a_share": false, "source": "", "url": "https://news.10jqka.com.cn/20260330/c675628804.shtml"}, {"id": "4160619", "title": "纳斯达克官方消息：该部门新设立的基金为其在亚洲的首只基金", "content": "纳斯达克官方消息：该部门新设立的基金为其在亚洲的首只基金。", "ctime": 1774851909, "time_str": "14:25:09", "stock_code": "", "stock_name": "", "stock_market": "", "is_a_share": false, "source": "", "url": "https://news.10jqka.com.cn/20260330/c675628780.shtml"}, {"id": "4160613", "title": "3月30日全国农产品批发市场猪肉平均价格为15.46元/公斤，比上周五下降1.7%", "content": "据农业农村部监测，3月30日“农产品批发价格200指数”为119.73，比上周五下降0.79个点，“菜篮子”产品批发价格指数为120.92，比上周五下降0.92个点。截至今日14:00时，全国农产品批发市场猪肉平均价格为15.46元/公斤，比上周五下降1.7%；鸡蛋7.86元/公斤，比上周五上升1.8%。(农业农村部)", "ctime": 1774851769, "time_str": "14:22:49", "stock_code": "", "stock_name": "", "stock_market": "", "is_a_share": false, "source": "", "url": "https://news.10jqka.com.cn/20260330/c675628713.shtml"}, {"id": "4160611", "title": "今年前2个月国开行农业基础设施中长期贷款发放额同比增长69%", "content": "记者3月30日从国家开发银行获悉，国开行用好新型政策性金融工具、农田建设专项贷款等金融产品，支持高标准农田、现代设施农业、农业新质生产力和垦区基础设施等重点领域发展。今年前2个月，国开行农业基础设施中长期贷款发放额同比增长69%。(新华社)", "ctime": 1774851701, "time_str": "14:21:41", "stock_code": "", "stock_name": "", "stock_market": "", "is_a_share": false, "source": "", "url": "https://news.10jqka.com.cn/20260330/c675628697.shtml"}, {"id": "4160585", "title": "纳米比亚专家：中国绿色发展利好非洲能源转型", "content": "纳米比亚大学纳米比亚绿色氢能研究所代理所长齐瓦伊·奇古瓦雷日前接受新华社记者采访时说，中国“十五五”规划纲要提出要加快发展方式绿色低碳转型，这一明确的政策导向为包括纳米比亚在内的非洲国家推进能源转型提供了重要机遇。（新华社）", "ctime": 1774851133, "time_str": "14:12:13", "stock_code": "", "stock_name": "", "stock_market": "", "is_a_share": false, "source": "", "url": "https://news.10jqka.com.cn/20260330/c675628533.shtml"}, {"id": "4160569", "title": "广州机场大面积延误，深圳机场多航班备降", "content": "受强对流天气影响，航旅纵横机场页面显示，3月30日广州白云机场大面积延误，航班延误比例达88%。广州白云机场目前为国内临时取消航班量最多的机场。航班管家数据显示，截至中午深圳宝安机场进港航班延误率为41.46%，备降航班12班次。（第一财经）", "ctime": 1774850971, "time_str": "14:09:31", "stock_code": "", "stock_name": "", "stock_market": "", "is_a_share": false, "source": "", "url": "https://news.10jqka.com.cn/20260330/c675628490.shtml"}, {"id": "4160567", "title": "现货黄金站上4530美元/盎司 纽约期金站上4560美元/盎司", "content": "现货黄金站上4530美元/盎司，日内涨0.83%。纽约期金站上4560美元/盎司，日内涨0.83%。", "ctime": 1774850943, "time_str": "14:09:03", "stock_code": "", "stock_name": "", "stock_market": "", "is_a_share": false, "source": "", "url": "https://news.10jqka.com.cn/20260330/c675628478.shtml"}, {"id": const SECTORS  = [{"name": "金融", "hit_count": 29, "etfs": []}, {"name": "人工智能", "hit_count": 18, "etfs": []}, {"name": "军工", "hit_count": 17, "etfs": []}, {"name": "数据要素", "hit_count": 16, "etfs": []}, {"name": "消费", "hit_count": 13, "etfs": []}, {"name": "新能源", "hit_count": 12, "etfs": []}, {"name": "机器人", "hit_count": 10, "etfs": []}, {"name": "半导体", "hit_count": 9, "etfs": []}];
const META     = {"update_time": "2026-03-30 15:12:38", "sentiment_score": 59.009009009009006, "agents": []};

// 工具函数
function pctClass(v) { return v >= 0 ? 'up' : 'down'; }
function pctStr(v) { return (v >= 0 ? '+' : '') + v.toFixed(2) + '%'; }
function impactBadge(score) {
  if (score >= 80) return '<span class="badge badge-s">S</span>';
  if (score >= 65) return '<span class="badge badge-a">A</span>';
  if (score >= 50) return '<span class="badge badge-b">B</span>';
  return '<span class="badge badge-c">C</span>';
}
function barColor(score) {
  if (score >= 80) return '#ef4444';
  if (score >= 65) return '#f59e0b';
  if (score >= 50) return '#3b82f6';
  return '#64748b';
}

// 市场状态
function updateMarketStatus() {
  const el = document.getElementById('market-status');
  const now = new Date();
  const bjHour = (now.getUTCHours() + 8) % 24;
  const bjMin = now.getUTCMinutes();
  const t = bjHour * 100 + bjMin;
  const day = (now.getUTCDay() + (now.getUTCHours() + 8 >= 24 ? 1 : 0)) % 7;
  if (day === 0 || day === 6) {
    el.innerHTML = '<span class="badge" style="background:rgba(100,116,139,0.2);color:#94a3b8">休市</span>';
  } else if (t >= 930 && t <= 1130 || t >= 1300 && t <= 1500) {
    el.innerHTML = '<span class="badge" style="background:rgba(34,197,94,0.2);color:#22c55e"><span class="pulse">●</span>&nbsp;交易中</span>';
  } else if (t >= 915 && t < 930) {
    el.innerHTML = '<span class="badge" style="background:rgba(245,158,11,0.2);color:#f59e0b">集合竞价</span>';
  } else {
    el.innerHTML = '<span class="badge" style="background:rgba(100,116,139,0.2);color:#94a3b8">已收盘</span>';
  }
  document.getElementById('update-time').textContent = META.update_time || '';
}

// KPI 卡片
function renderKPI() {
  const container = document.getElementById('kpi-cards');
  const sentimentScore = META.sentiment_score || 50;
  const pickCount = PICKS.length;
  const topScore = PICKS.length > 0 ? PICKS[0].total : 0;
  const hotSector = SECTORS.length > 0 ? SECTORS[0].name : '-';

  const kpis = [
    { label: '市场情绪', value: sentimentScore.toFixed(0), unit: '分', color: sentimentScore >= 60 ? '#ef4444' : sentimentScore >= 40 ? '#f59e0b' : '#22c55e' },
    { label: '精选个股', value: pickCount, unit: '只', color: '#3b82f6' },
    { label: '最高评分', value: topScore.toFixed(1), unit: '分', color: topScore >= 80 ? '#ef4444' : '#f59e0b' },
    { label: '热门板块', value: hotSector, unit: '', color: '#8b5cf6' },
  ];

  container.innerHTML = kpis.map(k => `
    <div class="card glow" style="border-left: 3px solid ${k.color}">
      <p class="text-xs text-gray-500 mb-1">${k.label}</p>
      <p class="text-2xl font-bold mono" style="color:${k.color}">${k.value}<span class="text-sm text-gray-500 ml-1">${k.unit}</span></p>
    </div>
  `).join('');
}

// Hot7
function renderHot7() {
  const container = document.getElementById('hot7-list');
  if (!HOT7 || HOT7.length === 0) {
    container.innerHTML = '<p class="text-gray-600 text-sm">暂无数据</p>';
    return;
  }
  container.innerHTML = HOT7.map((item, i) => `
    <div class="flex items-center gap-3 py-2 ${i < HOT7.length - 1 ? 'border-b border-gray-800' : ''}">
      <span class="w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold
        ${i < 3 ? 'bg-red-500/20 text-red-400' : 'bg-gray-700 text-gray-400'}">${i+1}</span>
      <div class="flex-1 min-w-0">
        <p class="text-sm font-medium truncate">${item.name || item.symbol}</p>
        <p class="text-xs text-gray-500 mono">${item.symbol}</p>
      </div>
      <span class="text-xs text-gray-400">${item.mentions}次提及</span>
    </div>
  `).join('');
}

// 精选个股
function renderPicks() {
  const tbody = document.getElementById('picks-table');
  if (!PICKS || PICKS.length === 0) {
    tbody.innerHTML = '<tr><td colspan="8" class="text-center text-gray-600 py-8">暂无符合条件的个股</td></tr>';
    return;
  }
  tbody.innerHTML = PICKS.map(p => {
    const dims = [
      { name: '情绪', val: p.sentiment, w: 25 },
      { name: '板块', val: p.sector, w: 20 },
      { name: '龙头', val: p.leader, w: 20 },
      { name: '资金', val: p.fund, w: 15 },
      { name: '量价', val: p.vp, w: 10 },
      { name: '封单', val: p.seal, w: 10 },
    ];
    const miniBar = dims.map(d => {
      const pct = (d.val / 100 * d.w).toFixed(1);
      return `<div class="flex items-center gap-1" title="${d.name}: ${d.val.toFixed(0)}">
        <span class="text-gray-600" style="font-size:9px;width:18px">${d.name.substring(0,2)}</span>
        <div class="score-bar flex-1"><div class="score-bar-fill" style="width:${d.val}%;background:${barColor(d.val)}"></div></div>
      </div>`;
    }).join('');
    return `<tr class="border-b border-gray-800/50 hover:bg-gray-800/30">
      <td class="py-2.5 px-2 mono text-xs text-gray-400">${p.symbol}</td>
      <td class="py-2.5 px-1 font-medium text-sm">${p.name}</td>
      <td class="py-2.5 px-1 text-right mono text-sm">${p.price.toFixed(2)}</td>
      <td class="py-2.5 px-1 text-right mono text-sm ${pctClass(p.pct)}">${pctStr(p.pct)}</td>
      <td class="py-2.5 px-1 text-right">${impactBadge(p.total)} <span class="mono text-sm ml-1">${p.total.toFixed(1)}</span></td>
      <td class="py-2.5 px-1"><div class="space-y-0.5">${miniBar}</div></td>
      <td class="py-2.5 px-1 text-right text-xs text-gray-400">${p.sector_name || '-'}</td>
      <td class="py-2.5 px-1 text-right mono text-xs ${p.consecutive_ups >= 3 ? 'text-red-400' : 'text-gray-400'}">${p.consecutive_ups || 0}天</td>
    </tr>`;
  }).join('');
}

// 板块热度图
function renderSectorChart() {
  if (!SECTORS || SECTORS.length === 0) return;
  const chart = echarts.init(document.getElementById('sector-chart'), null, { renderer: 'svg' });
  const names = SECTORS.map(s => s.name);
  const counts = SECTORS.map(s => s.hit_count);
  chart.setOption({
    backgroundColor: 'transparent',
    grid: { left: 80, right: 20, top: 10, bottom: 30 },
    xAxis: { type: 'value', axisLine: { lineStyle: { color: '#1e293b' } }, axisLabel: { color: '#64748b', fontSize: 11 }, splitLine: { lineStyle: { color: '#1e293b' } } },
    yAxis: { type: 'category', data: names.reverse(), axisLine: { lineStyle: { color: '#1e293b' } }, axisLabel: { color: '#94a3b8', fontSize: 12 } },
    series: [{
      type: 'bar', data: counts.reverse(), barWidth: 18,
      itemStyle: { borderRadius: [0, 4, 4, 0],
        color: new echarts.graphic.LinearGradient(0, 0, 1, 0, [
          { offset: 0, color: '#3b82f6' }, { offset: 1, color: '#8b5cf6' }
        ])
      },
      label: { show: true, position: 'right', color: '#94a3b8', fontSize: 11 }
    }],
    tooltip: { trigger: 'axis', backgroundColor: '#1e293b', borderColor: '#334155', textStyle: { color: '#e2e8f0' } }
  });
  window.addEventListener('resize', () => chart.resize());
}

// 新闻流
function renderNews() {
  const container = document.getElementById('news-feed');
  const items = (NEWS || []).slice(0, 30);
  if (items.length === 0) {
    container.innerHTML = '<p class="text-gray-600 text-sm">暂无新闻</p>';
    return;
  }
  container.innerHTML = items.map(n => {
    const stockTag = n.stock_name ? `<span class="text-xs text-blue-400 ml-2">${n.stock_name}</span>` : '';
    return `<div class="py-2 border-b border-gray-800/50">
      <div class="flex items-start gap-2">
        <span class="mono text-xs text-gray-600 mt-0.5 shrink-0">${n.time_str || ''}</span>
        <p class="text-sm text-gray-300 leading-relaxed">${n.title}${stockTag}</p>
      </div>
    </div>`;
  }).join('');
}

// 交易代理状态
function renderAgentStatus() {
  const container = document.getElementById('agent-status');
  const stateColors = {
    'IDLE': '#64748b', 'OBSERVE': '#f59e0b', 'READY': '#3b82f6',

        <span class="mono text-xs text-gray-400">评分 ${a.score}</span>
      </div>
    </div>
  `).join('');

// 倒计时
let nextRefresh = 180;
function updateCountdown() {
  nextRefresh--;
  if (nextRefresh <= 0) {
    location.reload();
    return;
  }
  document.getElementById('countdown').textContent = `刷新 ${nextRefresh}s`;
}

// 初始化
updateMarketStatus();
renderKPI();
renderHot7();
renderPicks();
renderSectorChart();
renderNews();
renderAgentStatus();
setInterval(updateCountdown, 1000);
setInterval(updateMarketStatus, 30000);
</script>
