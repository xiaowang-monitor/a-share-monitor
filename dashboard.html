ml"}, {"id": "4154951", "title": "南非回应法国撤回G7峰会参会邀请 法方否认受外力施压", "content": "当地时间3月27日，南非总统府表示，此前受邀出席今年6月在法国埃维昂举行的七国集团（G7）峰会的南非总统西里尔·拉马福萨，已被法方取消邀请。拉马福萨接受采访时表示，“当听到可能不再受邀的消息时，有人觉得这是被冷落，甚至猜测来自华盛顿的压力。但据我所知，没有任何国家施压。未获邀请不代表被忽视，毕竟七国集团本就不会邀请大多数国家。南非不是该集团成员，但只要受邀，南非定会参会并发出自己的声音”。法国外长巴罗26日就日前撤回对南非参加七国集团峰会邀请一事回应称，“法国未向任何压力屈服”。巴罗对媒体表示，“南非在所有重大国际议题上始终是法国的重要伙伴，两国保持密切沟通”。（央视新闻）", "ctime": 1774605325, "time_str": "17:55:25", "stock_code": "", "stock_name": "", "stock_market": "", "is_a_share": false, "source": "", "url": "https://news.10jqka.com.cn/20260327/c675598275.shtml"}, {"id": "4154949", "title": "峰璟股份：2025年净利润2.49亿元，同比下降29.69%", "content": "峰璟股份公告，2025年营业收入29.11亿元，同比下降5.93%。净利润2.49亿元，同比下降29.69%。公司董事会审议通过的利润分配预案为：以15亿股为基数，向全体股东每10股派发现金红利0.5元（含税），送红股0股（含税），不以公积金转增股本。", "ctime": 1774605230, "time_str": "17:53:50", "stock_code": "", "stock_name": "", "stock_market": "", "is_a_share": false, "source": "", "url": "https://news.10jqka.com.cn/20260327/c675598247.shtml"}, {"id": "4154947", "title": "雷军发文，小米机器人有新进展", "content": "3月27日，小米创办人，董事长兼CEO雷军在其个人微博发文，介绍小米机器人团队在灵巧手领域的新进展。雷军表示，小米机器人灵巧手，采用了“全掌触觉手套”“仿生结构设计”“类人汗腺散热”等多个创新解决方案，目前已经能够丝滑的完成拧螺丝、捏羽毛、抛接球等高精度、高泛化工作，并且通过了15万次抓握循环可靠性测试。雷军表示，希望通过不断的应用尝试，最终让机器人在工作站长时间部署中达成接近100%的作业成功率。（21世纪经济报道）", "ctime": 1774605217, "time_str": "17:53:37", "stock_code": "", "stock_name": "", "stock_market": "", "is_a_share": false, "source": "", "url": "https://news.10jqka.com.cn/20260327/c675598241.shtml"}, {"id": "4154943", "title": "新奥股份：2025年净利润46.81亿元，同比增长4.19%", "content": "新奥股份公告，2025年营业收入1314.57亿元，同比下降3.22%。净利润46.81亿元，同比增长4.19%。拟以30.94亿股为基数，向全体股东每10股派发现金红利9.6元（含税），合计拟发放现金红利29.7亿元（含税）。", "ctime": 1774605188, "time_str": "17:53:08", "stock_code": "", "stock_name": "", "stock_market": "", "is_a_share": false, "source": "", "url": "https://news.10jqka.com.cn/20260327/c675598237.shtml"}, {"id": "4154941", "title": "伊朗库姆市遭袭已致15死10伤", "content": "当地时间3月27日，伊朗库姆省一名安全官员表示，当天凌晨美国和以色列针对库姆市帕尔迪桑地区的袭击已造成15人死亡、10人受伤。该官员称，目前搜救工作仍在进行，以寻找其他遇难者遗体，死亡人数可能进一步增加。（央视新闻）", "stock_code": "", "stock_name": "", "stock_market": "", "is_a_share": false, "source": "", "url": "https://news.10jqka.com.cn/20260327/c675598158.shtml"}, {"id": "4154923", "title": "分红险演示利率拟下调至3.5%", "content": "3月27日从相关渠道获悉，人身险行业就调降分红险演示利率达成共识，拟进一步降低至3.5%，以防范销售误导与利差损风险。演示利率是保险公司销售分红险产品中进行未来利益演示时所采用的利率水平，目前分红险演示利率最高为3.9%。演示利率过高容易导致销售误导和隐形“刚兑”压力。（上证报）", "ctime": 1774604840, "time_str": "17:47:20", "stock_code": "", "stock_name": "", "stock_market": "", "is_a_share": false, "source": "", "url": "https://news.10jqka.com.cn/20260327/c675598157.shtml"}, {"id": "4154921", "title": "伊朗革命卫队：霍尔木兹海峡已关闭", "content": "伊朗方面消息称，伊朗革命卫队表示，霍尔木兹海峡已关闭，任何通过该水道的船只都将面临“严厉措施”。（财联社）", "ctime": 1774604775, "time_str": "17:46:15", "stock_code": "", "stock_name": "", "stock_market": "", "is_a_share": false, "source": "", "url": "https://news.10jqka.com.cn/20260327/c675598081.shtml"}, {"id": "4154919", "title": "韩国多地出现垃圾袋“抢购潮”", "content": "韩国实行垃圾计量收费，民众需购买专用垃圾袋。在中东局势持续紧张背景下，一些韩国民众担忧制造塑料产品的关键原料供应不足，多地出现垃圾袋“抢购潮”，一些超市采取了限购措施。韩国媒体26日报道，韩国政府计划将垃圾袋列为“核心管控品目”以监测供需情况，但强调现阶段库存充足、无需囤货。 (央视新闻)", "ctime": 1774604624, "time_str": "17:43:44", "stock_code": "", "stock_name": "", "stock_market": "", "is_a_share": false, "source": "", "url": "https://news.10jqka.com.cn/20260327/c675598056.shtml"}, {"id": "4154907", "title": "柳化股份：拟投资2.9亿元建设20万吨/年全酸性流化床过氧化氢项目", "content": "柳化股份公告，公司拟投资建设一套20万吨/年全酸性流化床过氧化氢生产装置，项目总投资约2.9亿元。项目建成后，公司27.5%双氧水产能将由16万吨/年提升至36万吨/年以上，有利于提升公司可持续经营能力与核心竞争力。", "ctime": 1774604437, "time_str": "17:40:37", "stock_code": "", "stock_name": "", "stock_market": "", "is_a_share": false, "source": "", "url": "https://news.10jqka.com.cn/20260327/c675597990.shtml"}, {"id": "4154905", "title": "王沪宁主持召开全国政协主席会议", "content": "政协第十四届全国委员会第四十九次主席会议27日下午在京召开。中共中央政治局常委、全国政协主席王沪宁主持并讲话。 会议传达学习贯彻习近平总书记近期重要讲话和重要指示精神。王沪宁表示，要深入学习贯彻习近平总书记在全国两会期间的重要讲话精神，坚持党的领导、统一战线、协商民主有机结合，常态化推进党的创新理论学习、研究、培训，紧扣经济社会发展的重大问题深入调查研究、积极协商议政，多做宣传政策、解疑释惑、理顺情绪、化解矛盾的工作，为实现“十五五”良好开局凝聚人心、凝聚共识、凝聚智慧、凝聚力量。要深入学习贯彻习近平总书记关于树立和践行正确政绩观的重要论述，坚持人民政协为人民，引导广大政协委员紧扣人民群众关心的热点难点问题多建利民之言、多做惠民之事，深入开展委员履职“服务为民”活动。要深入学习贯彻习近平总书记在河北雄安新区考察并主持召开深入推进雄安新区高质量建设和发展座谈会时的重要讲话精神，围绕雄安新区“努力建设新时代创新高地和推动高质量发展样板”的重点问题深入研究，提出有价值的意见和建议。 会议审议通过《全国政协十四届四次会议重点提案选题和督办方式》，确定76个重点提案选题。 (新华社)", "ctime": 1774604433, "time_str": "17:40:33", "stock_code": "", "stock_name": "", "stock_market": "", "is_a_share": false, "source": "", "url": "https://news.10jqka.com.cn/20260327/c675597975.shtml"}, {"id": "4154891", "title": "TCL科技等在深圳成立新公司", "content": "天眼查App显示，3月27日，纪元创新（深圳）科技技术有限公司成立，法定代表人为杨进，注册资本2亿人民币，经营范围包括工程和技术研究和试验发展、人工智能基础软件开发、人工智能应用软件开发等，由TCL科技（000100）、TCL王牌电器（惠州）有限公司、嘉藤（深圳）投资控股有限公司、嘉藤众励投资（深圳）合伙企业（有限合伙）共同持股。", "ctime": 1774604247, "time_str": "17:37:27", "stock_code": "", "stock_name": "", "stock_market": "", "is_a_share": false, "source": "", "url": "https://news.10jqka.com.cn/20260327/c675597910.shtml"}, {"id": "4154887", "title": "以军持续空袭伊朗军事设施，多线作战致兵力短缺", "content": "当地时间3月27日，以色列国防军发布战报称，以军在当天凌晨发动了新一轮空袭，打击了德黑兰的武器生产设施，以及伊朗西部的导弹发射阵地和储存设施。此外，以军还有针对性地打击了位于伊朗中部亚兹德的重要海军导弹和水雷生产基地。有以色列高级官员在一次内部会议上评估认为，虽然以军已经摧毁伊朗大部分的导弹发射装置，但伊朗方面仍然能够以目前的频率，持续向以色列发射导弹。（央视新闻）", "ctime": 1774604206, "time_str": "17:36:46", "stock_code": "", "stock_name": "", "stock_market": "", "is_a_share": false, "source": "", "url": "https://news.10jqka.com.cn/20260327/c675597895.shtml"}, {"id": "4154883", "title": "中航机载：2025年净利润10.67亿元，同比增长2.56%", "content": "中航机载公告，2025年实现营业收入242.12亿元，同比增长1.39%；净利润10.67亿元，同比增长2.56%。公司拟向全体股东每10股派发现金红利人民币0.46元（含税），不送股，不以资本公积转增股本。", "ctime": 1774604176, "time_str": "17:36:16", "stock_code": "", "stock_name": "", "stock_market": "", "is_a_share": false, "source": "", "url": "https://news.10jqka.com.cn/20260327/c675597883.shtml"}, {"id": "4154873", "title": "腾讯控股：3月27日以3.01亿港元回购61万股", "content": "腾讯控股公告，公司于2026年3月27日通过交易所回购61万股，每股回购价格介于488港元至498港元之间，总支付金额为3.01亿港元。", "ctime": 1774604104, "time_str": "17:35:04", "stock_code": "", "stock_name": "", "stock_market": "", "is_a_share": false, "source": "", "url": "https://news.10jqka.com.cn/20260327/c67559 function updateMarketStatus() {
  const el = document.getElementById('market-status');
  const now = new Date();
  const bjHour = (now.getUTCHours() + 8) % 24;
  const bjMin = now.getUTCMinutes();
  const t = bjHour * 100 + bjMin;
  const day = (now.getUTCDay() + (now.getUTCHours() + 8 >= 24 ? 1 : 0)) % 7;
  if (day === 0 || day === 6) {
    el.innerHTML = '<span class="badge" style="background:rgba(100,116,139,0.2);color:#94a3b8">休市</span>';
  } else if (t >= 930 && t <= 1130 || t >= 1300 && t <= 1500) {
    el.innerHTML = '<span class="badge" style="background:rgba(34,197,94,0.2);color:#22c55e"><span class="pulse">●</span>&nbsp;交易中</span>';

    el.innerHTML = '<span class="badge" style="background:rgba(245,158,11,0.2);color:#f59e0b">集合竞价</span>';
  } else {
    el.innerHTML = '<span class="badge" style="background:rgba(100,116,139,0.2);color:#94a3b8">已收盘</span>';
  }
  document.getElementById('update-time').textContent = META.update_time || '';

  const sentimentScore = META.sentiment_score || 50;
  const pickCount = PICKS.length;
  const topScore = PICKS.length > 0 ? PICKS[0].total : 0;
  const hotSector = SECTORS.length > 0 ? SECTORS[0].name : '-';

  const kpis = [
    { label: '市场情绪', value: sentimentScore.toFixed(0), unit: '分', color: sentimentScore >= 60 ? '#ef4444' : sentimentScore >= 40 ? '#f59e0b' : '#22c55e' },
    { label: '精选个股', value: pickCount, unit: '只', color: '#3b82f6' },
    { label: '最高评分', value: topScore.toFixed(1), unit: '分', color: topScore >= 80 ? '#ef4444' : '#f59e0b' },
    { label: '热门板块', value: hotSector, unit: '', color: '#8b5cf6' },
  ];

  container.innerHTML = kpis.map(k => `
    <div class="card glow" style="border-left: 3px solid ${k.color}">
      <p class="text-xs text-gray-500 mb-1">${k.label}</p>
      <p class="text-2xl font-bold mono" style="color:${k.color}">${k.value}<span class="text-sm text-gray-500 ml-1">${k.unit}</span></p>
    </div>
  `).join('');
}

// Hot7
function renderHot7() {
  const container = document.getElementById('hot7-list');
  if (!HOT7 || HOT7.length === 0) {
    container.innerHTML = '<p class="text-gray-600 text-sm">暂无数据</p>';
    return;
  }
  container.innerHTML = HOT7.map((item, i) => `
    <div class="flex items-center gap-3 py-2 ${i < HOT7.length - 1 ? 'border-b border-gray-800' : ''}">
      <span class="w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold
        ${i < 3 ? 'bg-red-500/20 text-red-400' : 'bg-gray-700 text-gray-400'}">${i+1}</span>
      <div class="flex-1 min-w-0">
        <p class="text-sm font-medium truncate">${item.name || item.symbol}</p>
        <p class="text-xs text-gray-500 mono">${item.symbol}</p>
      </div>
      <span class="text-xs text-gray-400">${item.mentions}次提及</span>
    </div>
  `).join('');
}

// 精选个股
function renderPicks() {
  const tbody = document.getElementById('picks-table');
  if (!PICKS || PICKS.length === 0) {
    tbody.innerHTML = '<tr><td colspan="8" class="text-center text-gray-600 py-8">暂无符合条件的个股</td></tr>';
    return;
  }
  tbody.innerHTML = PICKS.map(p => {
    const dims = [
      { name: '情绪', val: p.sentiment, w: 25 },
      { name: '板块', val: p.sector, w: 20 },
      { name: '龙头', val: p.leader, w: 20 },
      { name: '资金', val: p.fund, w: 15 },
      { name: '量价', val: p.vp, w: 10 },
      { name: '封单', val: p.seal, w: 10 },
    ];
    const miniBar = dims.map(d => {
      const pct = (d.val / 100 * d.w).toFixed(1);
      return `<div class="flex items-center gap-1" title="${d.name}: ${d.val.toFixed(0)}">
        <span class="text-gray-600" style="font-size:9px;width:18px">${d.name.substring(0,2)}</span>
        <div class="score-bar flex-1"><div class="score-bar-fill" style="width:${d.val}%;background:${barColor(d.val)}"></div></div>
      </div>`;
    }).join('');
    return `<tr class="border-b border-gray-800/50 hover:bg-gray-800/30">
      <td class="py-2.5 px-2 mono text-xs text-gray-400">${p.symbol}</td>
      <td class="py-2.5 px-1 font-medium text-sm">${p.name}</td>
      <td class="py-2.5 px-1 text-right mono text-sm">${p.price.toFixed(2)}</td>
      <td class="py-2.5 px-1 text-right mono text-sm ${pctClass(p.pct)}">${pctStr(p.pct)}</td>
      <td class="py-2.5 px-1 text-right">${impactBadge(p.total)} <span class="mono text-sm ml-1">${p.total.toFixed(1)}</span></td>
      <td class="py-2.5 px-1"><div class="space-y-0.5">${miniBar}</div></td>
      <td class="py-2.5 px-1 text-right text-xs text-gray-400">${p.sector_name || '-'}</td>
      <td class="py-2.5 px-1 text-right mono text-xs ${p.consecutive_ups >= 3 ? 'text-red-400' : 'text-gray-400'}">${p.consecutive_ups || 0}天</td>
    </tr>`;
  }).join('');
}

// 板块热度图
function renderSectorChart() {
  if (!SECTORS || SECTORS.length === 0) return;
  const chart = echarts.init(document.getElementById('sector-chart'), null, { renderer: 'svg' });
  const names = SECTORS.map(s => s.name);
  const counts = SECTORS.map(s => s.hit_count);
  chart.setOption({
    backgroundColor: 'transparent',
    grid: { left: 80, right: 20, top: 10, bottom: 30 },
    xAxis: { type: 'value', axisLine: { lineStyle: { color: '#1e293b' } }, axisLabel: { color: '#64748b', fontSize: 11 }, splitLine: { lineStyle: { color: '#1e293b' } } },
    yAxis: { type: 'category', data: names.reverse(), axisLine: { lineStyle: { color: '#1e293b' } }, axisLabel: { color: '#94a3b8', fontSize: 12 } },
    series: [{
      type: 'bar', data: counts.reverse(), barWidth: 18,
      itemStyle: { borderRadius: [0, 4, 4, 0],
        color: new echarts.graphic.LinearGradient(0, 0, 1, 0, [
          { offset: 0, color: '#3b82f6' }, { offset: 1, color: '#8b5cf6' }
        ])
      },
      label: { show: true, position: 'right', color: '#94a3b8', fontSize: 11 }
    }],
    tooltip: { trigger: 'axis', backgroundColor: '#1e293b', borderColor: '#334155', textStyle: { color: '#e2e8f0' } }
  });
  window.addEventListener('resize', () => chart.resize());
}

// 新闻流
function renderNews() {
  const container = document.getElementById('news-feed');
  const items = (NEWS || []).slice(0, 30);
  if (items.length === 0) {
    container.innerHTML = '<p class="text-gray-600 text-sm">暂无新闻</p>';
    return;
  }
  container.innerHTML = items.map(n => {
    const stockTag = n.stock_name ? `<span class="text-xs text-blue-400 ml-2">${n.stock_name}</span>` : '';
    return `<div class="py-2 border-b border-gray-800/50">
      <div class="flex items-start gap-2">
        <span class="mono text-xs text-gray-600 mt-0.5 shrink-0">${n.time_str || ''}</span>
        <p class="text-sm text-gray-300 leading-relaxed">${n.title}${stockTag}</p>
      </div>
    </div>`;
  }).join('');
}

// 交易代理状态
function renderAgentStatus() {
  const container = document.getElementById('agent-status');
  const stateColors = {
    'IDLE': '#64748b', 'OBSERVE': '#f59e0b', 'READY': '#3b82f6',
    'HOLD': '#ef4444', 'EXIT': '#22c55e'
  };
  const agents = META.agents || [];
  if (agents.length === 0) {
    container.innerHTML = '<p class="text-gray-600 text-sm">无活跃交易代理</p>';
    return;
  }
  container.innerHTML = agents.map(a => `
    <div class="flex items-center justify-between py-2 border-b border-gray-800/50">
      <div class="flex items-center gap-3">
        <span class="w-2 h-2 rounded-full" style="background:${stateColors[a.state] || '#64748b'}"></span>
        <div>
          <span class="text-sm font-medium">${a.name || a.symbol}</span>
          <span class="mono text-xs text-gray-500 ml-2">${a.symbol}</span>
        </div>
      </div>
      <div class="flex items-center gap-3">
        <span class="badge" style="background:${stateColors[a.state]}22;color:${stateColors[a.state]}">${a.state}</span>
        <span class="mono text-xs text-gray-400">评分 ${a.score}</span>
      </div>
    </div>
  `).join('');
}

// 倒计时
let nextRefresh = 180;
function updateCountdown() {
  nextRefresh--;
  if (nextRefresh <= 0) {
    location.reload();
    return;
  }
  document.getElementById('countdown').textContent = `刷新 ${nextRefresh}s`;
}

// 初始化
updateMarketStatus();
renderKPI();
renderHot7();
renderPicks();
renderSectorChart();
renderNews();
renderAgentStatus();
setInterval(updateCountdown, 1000);
setInterval(updateMarketStatus, 30000);
</script>
</body>
</html>
