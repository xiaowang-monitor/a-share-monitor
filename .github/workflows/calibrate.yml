name: 参数标定 (每周日)

on:
  schedule:
    # 每周日北京时间 20:00 (UTC 12:00)
    - cron: '0 12 * * 0'
  workflow_dispatch:

jobs:
  calibrate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run calibration
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: python monitor.py --mode calibrate --days 60

      - name: Commit optimized params
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add trading_params.json
          git diff --cached --quiet || git commit -m "auto: update trading params from calibration"
          git push
