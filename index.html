能产业发展论坛等多场活动。(新华社)", "ctime": 1774602281, "time_str": "17:04:41", "stock_code": "", "stock_name": "", "stock_market": "", "is_a_share": false, "source": "", "url": "https://news.10jqka.com.cn/20260327/c675596590.shtml"}, {"id": "4154593", "title": "艾迪药业：收购南大药业22.2324%股权", "content": "艾迪药业公告，公司拟以1.3亿元的价格，以自有或自筹资金收购华泰国信、道兴创投及姚繁狄持有的南大药业合计22.2324%股权。其中，拟收购华泰国信持有的南大药业19.6337%的股权、道兴创投持有的南大药业0.0987%的股权、姚繁狄持有的南大药业2.5000%的股权。", "ctime": 1774602273, "time_str": "17:04:33", "stock_code": "", "stock_name": "", "stock_market": "", "is_a_share": false, "source": "", "url": "https://news.10jqka.com.cn/20260327/c675596581.shtml"}, {"id": "4154591", "title": "伊朗称多处文化遗产在美以袭击中受损", "content": "当地时间27日，伊朗德黑兰市议会文化遗产委员会主席阿拉维表示，在美国和以色列对伊朗开展的打击行动中，伊朗全国多地文化遗产遭到破坏。阿拉维称，伊朗全国至少有120处博物馆、历史建筑及文化遗址遭到直接打击，并出现不同程度的结构性损坏。其中，德黑兰省受影响最为严重，受损文物数量超过50处。据介绍，受损建筑包括多处知名地标，包括古列斯坦王宫、萨德阿巴德宫等。（央视新闻）", "ctime": 1774602267, "time_str": "17:04:27", "stock_code": "", "stock_name": "", "stock_market": "", "is_a_share": false, "source": "", "url": "https://news.10jqka.com.cn/20260327/c675596571.shtml"}, {"id": "4154589", "title": "商务部、中国出口信用保险公司联合印发《关于充分发挥出口信用保险作用 推动“十五五”商务高质量发展良好开局的通知》", "content": "为贯彻落实党中央、国务院决策部署，近日，商务部、中国出口信用保险公司（以下简称中信保公司）联合印发《关于充分发挥出口信用保险作用 推动“十五五”商务高质量发展良好开局的通知》，指导各地商务主管部门和中信保公司各营业机构加强协同配合，加大出口信用保险支持力度，加快商务高质量发展，积极服务“十五五”良好开局。《通知》围绕2026年商务高质量发展重点任务，充分发挥出口信用保险作用，提出6方面具体举措。一是优化升级货物贸易。二是培育外贸新动能。三是推进内外贸一体化。四是引导产供链合理有序跨境布局。五是深化“一带一路”经贸合作。六是强化对中小微企业支持。《通知》强调，各地商务主管部门要在符合世贸组织规则前提下，持续完善出口信用保险政策支持体系，推动存量和增量政策提质增效。中信保公司各营业机构要高质量履行职能，优化承保、理赔追偿、融资增信、资信等服务，为企业应对外部冲击、开拓多元市场、稳住出口订单、拓展内销渠道、稳定生产经营提供有力有效风险保障服务。（商务部）", "ctime": 1774602259, "time_str": "17:04:19", "stock_code": "", "stock_name": "", "stock_market": "", "is_a_share": false, "source": "", "url": "https://news.10jqka.com.cn/20260327/c675596556.shtml"}, {"id": "4154557", "title": "中国人民银行：深化重点金融机构改革，推动多渠道加大资本补充力度", "content": "近日，中国人民银行召开2026年金融稳定工作会议。会议要求，2026年，金融稳定工作要坚持政治引领，强化理论武装，树立和践行正确政绩观，将党建与业务深度融合，确保“十五五”时期金融稳定工作高标准起步、高质量推进。不断完善系统性金融风险防范化解体系，推动科技赋能工作做深做实，强化金融风险监测、评估、预警和早期纠正，持续遏制增量风险。坚持市场化法治化原则，积极稳妥处置重点领域金融风险，有序压降存量风险。深化重点金融机构改革，推动多渠道加大资本补充力度。增强开放格局下的金融风险防控能力，维护国家金融安全。筑牢金融稳定保障体系，充实风险处置资源和手段，坚决守住不发生系统性金融风险的底线。", "ctime": 1774602082, "time_str": "17:01:22", "stock_code": "", "stock_name": "", "stock_market": "", "is_a_share": false, "source": "", "url": "https://news.10jqka.com.cn/20260327/c675596451.shtml"}, {"id": "4154555", "title": "小鹏汽车：中文名称将由“小鹏汽车有限公司”变更为“小鹏集团”", "content": "小鹏汽车-W公告，自2026年4月1日起，公司中文名称（仅用于识别）将由“小鹏汽车有限公司”变更为“小鹏集团”，英文名称维持不变。同时，公司A类普通股中文股份简称将于同一时间由“小鹏汽车–W”变更为“小鹏集团–W”，英文简称“XPENG–W”及股份代号“9868”维持不变。", "ctime": 1774602071, "time_str": "17:01:11", "stock_code": "", "stock_name": "", "stock_market": "", "is_a_share": false, "source": "", "url": "https://news.10jqka.com.cn/20260327/c675596442.shtml"}, {"id": "4154535", "title": "坤彩科技：2025年净利润亏损9289.55万元", "content": "坤彩科技发布业绩快报，2025年度营业总收入12.58亿元，同比增长29.74%。报告期内，公司在市场经济环境波动及海外市场政策多变等多重挑战下，公司持续保持在珠光材料业务领域的竞争优势，珠光材料业务收入与利润实现稳步增长。钛白粉及氧化铁业务产能逐步释放，销量及收入实现提升，但受行业市场价格下行影响，本期计提大额资产减值准备，导致净利润出现亏损。归属于上市公司股东的净利润-9289.55万元，同比下降364.34%。", "ctime": 1774602013, "time_str": "17:00:13", "stock_code": "", "stock_name": "", "stock_market": "", "is_a_share": false, "source": "", "url": "https://news.10jqka.com.cn/20260327/c675596327.shtml"}, {"id": "4154533", "title": "王文涛部长会见欧委会贸易和经济安全委员谢夫乔维奇", "content": "3月26日，商务部部长王文涛在喀麦隆雅温得出席世贸组织第十四届部长级会议(MC14)期间，会见欧委会贸易和经济安全委员谢夫乔维奇。双方就世贸组织改革、中欧经贸关系等议题深入交换了意见。中国常驻世贸组织代表团大使李詠箑参加会见。（商务部）", "ctime": 1774602011, "time_str": "17:00:11", "stock_code": "", "stock_name": "", "stock_market": "", "is_a_share": false, "source": "", "url": "https://news.10jqka.com.cn/20260327/c675596306.shtml"}, {"id": "4154527", "title": "坤彩科技：预计2026年第一季度净利润同比增长151.56%到235.41%", "content": "坤彩科技公告，预计2026年第一季度实现归属于上市公司股东的净利润为6000万元到8000万元，与上年同期2385.14万元相比，将增加3614.86万元到5614.86万元，同比增加151.56%到235.41%。预计2026年第一季度实现归属于上市公司股东的扣除非经常性损益的净利润为6000万元到8000万元，与上年同期2165.93万元相比，将增加3834.07万元到5834.07万元，同比增加177.02%到269.36%。预计2026年第一季度营业收入为3.8亿元到4.5亿元，与上年同期2.58亿元相比，将增加1.22亿元到1.92亿元，同比增加47.40%到74.56%。", "ctime": 1774602007, "time_str": "17:00:07", "stock_code": "", "stock_name": "", "stock_market": "", "is_a_share": false, "source": "", "url": "https://news.10jqka.com.cn/20260327/c675596262.shtml"}, {"id": "4154525", "title": "美媒：共和党人称约翰逊大发雷霆，强力施压他们投票支持延长《涉外情报监控法》", "content": "安娜·卢娜等共和党籍众议员告诉该媒体，共和党籍众议院议长迈克·约翰逊日前曾对他们大发雷霆，强力施压他们投票支持延长《涉外情报监控法》第702条。据报道，卢娜在接受采访时将这次发生在国会议事厅的训斥比喻称 “（就像）被按在地上打屁股”。她称，训斥者警告说，如果她投票反对延长《涉外情报监控法》，她将对“数千名美国人的死亡”负有责任。共和党籍众议员拉尔夫·诺曼向Axios描述当时的情景时表示，约翰逊确实发表了上述言论，他“很生气，且感到沮丧”。（环球网）", "ctime": 1774601997, "time_str": "16:59:57", "stock_code": "", "stock_name": "", "stock_market": "", "is_a_share": false, "source": "", "url": "https://news.10jqka.com.cn/20260327/c675596239.shtml"}, {"id": "4154523", "title": "锐捷网络：2025年净利润6.96亿元，同比增长21.30%", "content": "锐捷网络公告，2025年营业收入143.16亿元，同比增长22.37%。净利润6.96亿元，同比增长21.30%。公司董事会审议通过的利润分配预案为：以7.95亿股为基数，向全体股东每10股派发现金红利5.25元（含税），送红股0股（含税），以资本公积金向全体股东每10股转增4股。", "ctime": 1774601988, "time_str": "16:59:48", "stock_code": "", "stock_name": "", "stock_market": "", "is_a_share": false, "source": "", "url": "https://news.10jqka.com.cn/20260327/c675596233.shtml"}, {"id": "4154521", "title": "新华保险：2025年净利润362.84亿元，同比增长38.3%", "content": "新华保险公告，2025年实现原保险保费收入1958.71亿元，同比增长14.9%；内含价值2878.4亿元，同比增长11.4%；归属于母公司股东的净利润362.84亿元，同比增长38.3%。公司拟向全体股东派发2025年末期现金股利每股2.06元（含税），共计64.26亿元，2025年合计派发现金股利85.16亿元，同比增加7.9%。", "ctime": 1774601976, "time_str": "16:59:36", "stock_code": "", "stock_name": "", "stock_market": "", "is_a_share": false, "source": "", "url": "https://news.10jqka.com.cn/20260327/c675596231.shtml"}, {"id": "4154511", "title": "2月我国国际收支货物和服务贸易进出口规模39349亿元", "content": "国家外汇局3月27日公布的数据显示，2026年2月，我国国际收支货物和服务贸易进出口规模39349亿元。其中，货物和服务贸易出口21476亿元，进口17873亿元，顺差3603亿元。服务贸易主要项目为：旅行服务进出口规模1596亿元，其他商业服务进出口规模1285亿元，运输服务进出口规模1033亿元，电信、计算机和信息服务进出口规模628亿元。按美元计值，2026年2月，我国国际收支货物和服务贸易出口3092亿美元，进口2573亿美元，顺差519亿美元。（央视新闻）", "ctime": 1774601901, "time_str": "16:58:21", "stock_code": "", "stock_name": "", "stock_mar const META     = {"update_time": "2026-03-27 17:13:05", "sentiment_score": 55.111111111111114, "agents": []};

// 工具函数
function pctClass(v) { return v >= 0 ? 'up' : 'down'; }
function pctStr(v) { return (v >= 0 ? '+' : '') + v.toFixed(2) + '%'; }
function impactBadge(score) {
  if (score >= 80) return '<span class="badge badge-s">S</span>';
  if (score >= 65) return '<span class="badge badge-a">A</span>';
  if (score >= 50) return '<span class="badge badge-b">B</span>';
  return '<span class="badge badge-c">C</span>';
}
function barColor(score) {
  if (score >= 80) return '#ef4444';
  if (score >= 65) return '#f59e0b';
  if (score >= 50) return '#3b82f6';
  return '#64748b';
}

// 市场状态
function updateMarketStatus() {
  const el = document.getElementById('market-status');
  const now = new Date();
  const bjHour = (now.getUTCHours() + 8) % 24;
  const bjMin = now.getUTCMinutes();
  const t = bjHour * 100 + bjMin;
  const day = (now.getUTCDay() + (now.getUTCHours() + 8 >= 24 ? 1 : 0)) % 7;
  if (day === 0 || day === 6) {
    el.innerHTML = '<span class="badge" style="background:rgba(100,116,139,0.2);color:#94a3b8">休市</span>';
  } else if (t >= 930 && t <= 1130 || t >= 1300 && t <= 1500) {
    el.innerHTML = '<span class="badge" style="background:rgba(34,197,94,0.2);color:#22c55e"><span class="pulse">●</span>&nbsp;交易中</span>';
  } else if (t >= 915 && t < 930) {
    el.innerHTML = '<span class="badge" style="background:rgba(245,158,11,0.2);color:#f59e0b">集合竞价</span>';
  } else {
    el.innerHTML = '<span class="badge" style="background:rgba(100,116,139,0.2);color:#94a3b8">已收盘</span>';
  }
  document.getElementById('update-time').textContent = META.update_time || '';
}

// KPI 卡片
function renderKPI() {
  const container = document.getElementById('kpi-cards');
  const sentimentScore = META.sentiment_score || 50;
  const pickCount = PICKS.length;
  const topScore = PICKS.length > 0 ? PICKS[0].total : 0;
  const hotSector = SECTORS.length > 0 ? SECTORS[0].name : '-';

  const kpis = [
    { label: '市场情绪', value: sentimentScore.toFixed(0), unit: '分', color: sentimentScore >= 60 ? '#ef4444' : sentimentScore >= 40 ? '#f59e0b' : '#22c55e' },
    { label: '精选个股', value: pickCount, unit: '只', color: '#3b82f6' },
    { label: '最高评分', value: topScore.toFixed(1), unit: '分', color: topScore >= 80 ? '#ef4444' : '#f59e0b' },
    { label: '热门板块', value: hotSector, unit: '', color: '#8b5cf6' },
  ];

  container.innerHTML = kpis.map(k => `
    <div class="card glow" style="border-left: 3px solid ${k.color}">
      <p class="text-xs text-gray-500 mb-1">${k.label}</p>
      <p class="text-2xl font-bold mono" style="color:${k.color}">${k.value}<span class="text-sm text-gray-500 ml-1">${k.unit}</span></p>
    </div>
  `).join('');
}

// Hot7
function renderHot7() {
  const container = document.getElementById('hot7-list');
  if (!HOT7 || HOT7.length === 0) {
    container.innerHTML = '<p class="text-gray-600 text-sm">暂无数据</p>';
    return;
  }
  container.innerHTML = HOT7.map((item, i) => `
    <div class="flex items-center gap-3 py-2 ${i < HOT7.length - 1 ? 'border-b border-gray-800' : ''}">

        ${i < 3 ? 'bg-red-500/20 text-red-400' : 'bg-gray-700 text-gray-400'}">${i+1}</span>
      <div class="flex-1 min-w-0">
        <p class="text-sm font-medium truncate">${item.name || item.symbol}</p>
        <p class="text-xs text-gray-500 mono">${item.symbol}</p>
      </div>
      <span class="text-xs text-gray-400">${item.mentions}次提及</span>
    </div>
  `).join('');
}

// 精选个股
function renderPicks() {
  const tbody = document.getElementById('picks-table');
  if (!PICKS || PICKS.length === 0) {
    tbody.innerHTML = '<tr><td colspan="8" class="text-center text-gray-600 py-8">暂无符合条件的个股</td></tr>';
    return;
  }
  tbody.innerHTML = PICKS.map(p => {

      { name: '情绪', val: p.sentiment, w: 25 },

      { name: '资金', val: p.fund, w: 15 },
      { name: '量价', val: p.vp, w: 10 },
      { name: '封单', val: p.seal, w: 10 },
    ];
    const miniBar = dims.map(d => {

      return `<div class="flex items-center gap-1" title="${d.name}: ${d.val.toFixed(0)}">
        <span class="text-gray-600" style="font-size:9px;width:18px">${d.name.substring(0,2)}</span>
        <div class="score-bar flex-1"><div class="score-bar-fill" style="width:${d.val}%;background:${barColor(d.val)}"></div></div>
      </div>`;
    }).join('');
    return `<tr class="border-b border-gray-800/50 hover:bg-gray-800/30">
      <td class="py-2.5 px-2 mono text-xs text-gray-400">${p.symbol}</td>
      <td class="py-2.5 px-1 font-medium text-sm">${p.name}</td>
      <td class="py-2.5 px-1 text-right mono text-sm">${p.price.toFixed(2)}</td>
      <td class="py-2.5 px-1 text-right mono text-sm ${pctClass(p.pct)}">${pctStr(p.pct)}</td>
      <td class="py-2.5 px-1 text-right">${impactBadge(p.total)} <span class="mono text-sm ml-1">${p.total.toFixed(1)}</span></td>
      <td class="py-2.5 px-1"><div class="space-y-0.5">${miniBar}</div></td>
      <td class="py-2.5 px-1 text-right text-xs text-gray-400">${p.sector_name || '-'}</td>
      <td class="py-2.5 px-1 text-right mono text-xs ${p.consecutive_ups >= 3 ? 'text-red-400' : 'text-gray-400'}">${p.consecutive_ups || 0}天</td>
    </tr>`;
  }).join('');
}

// 板块热度图
function renderSectorChart() {
  if (!SECTORS || SECTORS.length === 0) return;
  const chart = echarts.init(document.getElementById('sector-chart'), null, { renderer: 'svg' });
  const names = SECTORS.map(s => s.name);
  const counts = SECTORS.map(s => s.hit_count);
  chart.setOption({
    backgroundColor: 'transparent',
    grid: { left: 80, right: 20, top: 10, bottom: 30 },
    xAxis: { type: 'value', axisLine: { lineStyle: { color: '#1e293b' } }, axisLabel: { color: '#64748b', fontSize: 11 }, splitLine: { lineStyle: { color: '#1e293b' } } },
    yAxis: { type: 'category', data: names.reverse(), axisLine: { lineStyle: { color: '#1e293b' } }, axisLabel: { color: '#94a3b8', fontSize: 12 } },
    series: [{
      type: 'bar', data: counts.reverse(), barWidth: 18,
      itemStyle: { borderRadius: [0, 4, 4, 0],
        color: new echarts.graphic.LinearGradient(0, 0, 1, 0, [
          { offset: 0, color: '#3b82f6' }, { offset: 1, color: '#8b5cf6' }
        ])
      },
      label: { show: true, position: 'right', color: '#94a3b8', fontSize: 11 }
    }],
    tooltip: { trigger: 'axis', backgroundColor: '#1e293b', borderColor: '#334155', textStyle: { color: '#e2e8f0' } }
  });
  window.addEventListener('resize', () => chart.resize());
}

// 新闻流
function renderNews() {
  const container = document.getElementById('news-feed');
  const items = (NEWS || []).slice(0, 30);
  if (items.length === 0) {
    container.innerHTML = '<p class="text-gray-600 text-sm">暂无新闻</p>';
    return;
  }
  container.innerHTML = items.map(n => {
    const stockTag = n.stock_name ? `<span class="text-xs text-blue-400 ml-2">${n.stock_name}</span>` : '';
    return `<div class="py-2 border-b border-gray-800/50">
      <div class="flex items-start gap-2">
        <span class="mono text-xs text-gray-600 mt-0.5 shrink-0">${n.time_str || ''}</span>
        <p class="text-sm text-gray-300 leading-relaxed">${n.title}${stockTag}</p>
      </div>
    </div>`;
  }).join('');
}

// 交易代理状态
function renderAgentStatus() {
  const container = document.getElementById('agent-status');
  const stateColors = {
    'IDLE': '#64748b', 'OBSERVE': '#f59e0b', 'READY': '#3b82f6',
    'HOLD': '#ef4444', 'EXIT': '#22c55e'
  };
  const agents = META.agents || [];
  if (agents.length === 0) {
    container.innerHTML = '<p class="text-gray-600 text-sm">无活跃交易代理</p>';
    return;
  }
  container.innerHTML = agents.map(a => `
    <div class="flex items-center justify-between py-2 border-b border-gray-800/50">
      <div class="flex items-center gap-3">
        <span class="w-2 h-2 rounded-full" style="background:${stateColors[a.state] || '#64748b'}"></span>
        <div>
          <span class="text-sm font-medium">${a.name || a.symbol}</span>
          <span class="mono text-xs text-gray-500 ml-2">${a.symbol}</span>
        </div>
      </div>
      <div class="flex items-center gap-3">
        <span class="badge" style="background:${stateColors[a.state]}22;color:${stateColors[a.state]}">${a.state}</span>
        <span class="mono text-xs text-gray-400">评分 ${a.score}</span>
      </div>
    </div>
  `).join('');
}

// 倒计时
let nextRefresh = 180;
function updateCountdown() {
  nextRefresh--;
  if (nextRefresh <= 0) {
    location.reload();
    return;
  }
  document.getElementById('countdown').textContent = `刷新 ${nextRefresh}s`;
}

// 初始化
updateMarketStatus();
renderKPI();
renderHot7();
renderPicks();
renderSectorChart();
renderNews();
renderAgentStatus();
setInterval(updateCountdown, 1000);
setInterval(updateMarketStatus, 30000);
</script>
</body>
</html>
