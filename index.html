.score-bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s; }
.up { color: var(--red); }
.down { color: var(--green); }
.pulse { animation: pulse 2s infinite; }
@keyframes pulse {

  50% { opacity: 0.5; }

const NEWS     = [{"id": "4154033", "title": "外交部：愿同尼泊尔新政府共同努力推动双边关系不断向前发展", "content": "3月27日，外交部发言人林剑主持例行记者会。有记者就尼泊尔新政府相关内容提问。林剑表示，中方对此表示祝贺。作为传统友好邻邦，中方将一如既往地支持尼泊尔维护独立、主权和领土完整，支持尼泊尔实现团结稳定，发展繁荣。愿同尼泊尔新政府共同努力，赓续传统友谊，深化务实合作，推动中尼面向发展与繁荣的世代友好的战略合作伙伴关系不断向前发展。（央视新闻）", "ctime": 1774597225, "time_str": "15:40:25", "stock_code": "", "stock_name": "", "stock_market": "", "is_a_share": false, "source": "", "url": "https://news.10jqka.com.cn/20260327/c675591058.shtml"}, {"id": "4154029", "title": "一涉嫌在美军事基地安放爆炸物的男子已逃往中国？外交部回应", "content": "3月27日，外交部发言人林剑主持例行记者会。法新社记者提问，美国联邦调查局表示，一名涉嫌于本月初在佛罗里达州某军事基地安放爆炸装置的男子已逃往中国。外交部对此有何评论？关于美国总统特朗普即将在5月访华，中方是否有更详细的信息？林剑说：“关于第一个问题，我不了解你提到的情况。关于第二个问题，中美双方就特朗普总统访华事保持着沟通。”（澎湃新闻）", "ctime": 1774597186, "time_str": "15:39:46", "stock_code": "", "stock_name": "", "stock_market": "", "is_a_share": false, "source": "", "url": "https://news.10jqka.com.cn/20260327/c675591023.shtml"}, {"id": "4154023", "title": "外交部：中方在巴拿马有关港口问题上的立场是明确的", "content": "3月27日，外交部发言人林剑主持例行记者会。有记者问就巴拿马有关港口内容提问。林剑表示，中方在巴拿马有关港口问题上的立场是明确的，美方一再说三道四，只能暴露自身霸占运河的图谋。你提到的具体情况，建议你向中方的主管部门询问。(央视新闻)", "ctime": 1774597144, "time_str": "15:39:04", "stock_code": "", "stock_name": "", "stock_market": "", "is_a_share": false, "source": "", "url": "https://news.10jqka.com.cn/20260327/c675590991.shtml"}, {"id": "4154021", "title": "日本10年期国债收益率升至1999年以来最高水平", "content": "日本10年期国债收益率升至1999年以来最高水平。", "ctime": 1774597125, "time_str": "15:38:45", "stock_code": "", "stock_name": "", "stock_market": "", "is_a_share": false, "source": "", "url": "https://news.10jqka.com.cn/20260327/c675590983.shtml"}, {"id": "4154015", "title": "两部门：根据空间业务实际占用带宽向卫星运营商收取无线电频率占用费", "content": "国家发展改革委、财政部发布关于优化完善无线电频率占用费标准的通知，一、优化空间业务收费标准体系。非对地静止轨道（NGSO)卫星星座系统和网络化运营的对地静止轨道（GSO）卫星系统，由按照空间电台、地球站分别向卫星运营商和网内地球站设台单位收取，调整为根据空间业务实际占用带宽向卫星运营商收取。对星座卫星数量在200颗以下的NGSO卫星星座系统，按照空间电台数量收费；对星座卫星数量在200颗及以上的NGSO卫星星座系统，统一按系统收费。二、降低高频段收费标准。对NGSO卫星星座系统、网络化运营的GSO卫星系统、微波站、宽带无线接入系统，按照频率高低细化收费分档，部分高频段频率实行更低的收费标准。三、制定新型无线电应用收费标准。明确5G—R铁路专用无线通信系统、工业专网、无人驾驶航空器系统（限获得许可的）、宽带数字集群通信系统等无线电应用收费标准。（国家发改委）", "ctime": 1774597098, "time_str": "15:38:18", "stock_code": "", "stock_name": "", "stock_market": "", "is_a_share": false, "source": "", "url": "https://news.10jqka.com.cn/20260327/c675590972.shtml"}, {"id": "4154011", "title": "美媒：美考虑向中东增派1万人地面部队特朗普称对伊朗军事行动继续", "content": "据美国《华尔街日报》26日报道，美国防部官员透露，国防部正考虑向中东增派多达1万人的地面部队。报道说，这支部队预计包括步兵和装甲车辆，目前尚不清楚这支部队在中东的具体部署地点，但其位置很可能处于能够对伊朗及其石油出口枢纽哈尔克岛实施打击的范围内。美国总统特朗普26日否认急于同伊朗达成协议，并表示美国对伊朗的军事行动正在继续。早些时候，伊朗方面说，已正式回应美方所提“15点计划”，美国关于谈判的说法不过是“欺骗”伎俩。特朗普当天在内阁会议上猛烈抨击美国媒体报道他迫切期望通过外交途径结束战争，坚称是伊朗方面寻求重启谈判。他称，是否停战取决于伊朗，而在此期间，美军轰炸将继续。他还称，不在乎能否与伊朗达成协议，“我一点也不着急”。伊朗外交部长阿拉格齐25日表示，过去几天，美国通过几个友好国家向伊朗传递信息，伊方则经由这些调解方向美方发出警告或表明立场。“这不是谈判或对话，而是信息交流。”伊朗新闻电视台当天援引一名高级官员的话报道说，伊朗拒绝美国提出的停战方案，并提出伊方关于停战的5项条件。伊朗媒体26日援引知情人士的话报道，伊朗的回应已于25日晚通过斡旋国家正式发出。伊朗很清楚，“这一次，美国人又以谈判为幌子，企图为新的罪行铺路”。(新华社)", "ctime": 1774597049, "time_str": "15:37:29", "stock_code": "", "stock_name": "", "stock_market": "", "is_a_share": false, "source": "", "url": "https://news.10jqka.com.cn/20260327/c675590959.shtml"}, {"id": "4154003", "title": "中国证监会原发行审核委员会主任委员郭旭东涉嫌职务犯罪被移送检察机关审查起诉", "content": "据中央纪委国家监委驻中国证监会纪检监察组、浙江省纪委监委消息：日前，经中央纪委国家监委批准，中央纪委国家监委驻中国证监会纪检监察组与浙江省台州市监委对中国证监会原发行审核委员会主任委员、发行监管部副主任、一级巡视员郭旭东严重职务违法问题进行了立案调查。郭旭东无视中央八项规定精神，违规接受宴请、收受礼品礼金；背弃职责使命，在股票发行审核工作中搞区别对待，收受股权；利用监管职权为企业上市、再融资打招呼；离职时欺骗组织，到监管对象违规从业，收受巨额财物，并在组织核查时作虚假说明；利用职务身份价值，收受私募基金股权；非法收受财物，数额特别巨大。郭旭东行为已构成严重职务违法并涉嫌受贿犯罪，且在党的十八大后不收敛、不收手，性质严重，影响恶劣，应予严肃处理。依据《中华人民共和国监察法》《中华人民共和国公职人员政务处分法》等有关规定，没收其违法所得；将其涉嫌犯罪问题移送检察机关依法审查起诉，所涉财物一并移送。（中央纪委国家监委驻中国证监会纪检监察组）", "ctime": 1774597001, "time_str": "15:36:41", "stock_code": "", "stock_name": "", "stock_market": "", "is_a_share": false, "source": "", "url": "https://news.10jqka.com.cn/20260327/c675590949.shtml"}, {"id": "4153995", "title": "伊朗逮捕超15名涉嫌向美以提供情报人员", "content": "当地时间27日，伊朗情报部门表示，在近期开展的行动中，于伊斯法罕省识别并逮捕15名以上被指与美国、以色列相关的人员。据介绍，这些人员被指曾向美、以方面发送有关空袭地点的影像，以及伊朗军队部署、军事设施、救援点和检查站等位置信息。目前，被捕人员已移交司法机关接受相应处置。（央视新闻）", "ctime": 1774596953, "time_str": "15:35:53", "stock_code": "", "stock_name": "", "stock_market": "", "is_a_share": false, "source": "", "url": "https://news.10jqka.com.cn/20260327/c675590928.shtml"}, {"id": "4153993", "title": "欧科亿：预计2026年第一季度净利润为1.8亿元至2.2亿元", "content": "欧科亿公告，预计2026年第一季度实现归属于母公司所有者的净利润为1.8亿元至2.2亿元，与上年同期相比，将增加1.72亿元至2.12亿元。预计2026年第一季度实现归属于母公司所有者的扣除非经常性损益的净利润为1.75亿元至2.15亿元，与上年同期相比，将增加1.74亿元至2.14亿元。报告期内，硬质合金刀具的主要原材料碳化钨持续大幅上涨，公司具有资金优势和规模效应优势，实现产品量价齐升。2026年一季度，公司数控刀片和数控刀具产业园项目产能利用率均持续提升，产品相应提价，毛利率和净利率同比提升，推动公司盈利能力提升。", "ctime": 1774596938, "time_str": "15:35:38", "stock_code": "", "stock_name": "", "stock_market": "", "is_a_share": false, "source": "", "url": "https://news.10jqka.com.cn/20260327/c675590922.shtml"}, {"id": "4153985", "title": "光大期货：黄金波动加剧，短线有二次探底吗？", "content": "隔夜伦敦现货黄金震荡回落，COMEX黄金期货跌3.85%，SHFE黄金下跌2.83%。关于美伊是否顺利进入和平谈判，各方表态不一：当前美国提出了停火协议15点内容；伊朗拒绝美方方案，并提出伊方关于停战的条件，其中包括要求赔偿；以色列担心战争可能突然结束，正抓紧时间尽可能多地空袭伊朗境内目标。当前市场交易难度加大，对宏观环境的多变性也反复计价，意味着黄金尚未企稳，短期可继续观望。\n各类资产表现不一。美股美债美元呈现不同程度回落，其中美股科技股重创，芯片股重挫近5%，拖累纳指跌超2%；美债大跌，收益率持续走高，2年期涨超10基点，7年期涨9.6基点，代表市场对“高利率更久、降息推迟甚至不降息”定价强烈；美元盘中一度上涨超0.35%，尾盘跳水，跌至平盘。美伊谈判及冲突走向仍然充满着不确定性，油价上涨引发通胀担忧，短线风险资产再次承压，谨慎对待。（光大期货）", "ctime": 1774596900, "time_str": "15:35:00", "stock_code": "", "stock_name": "", "stock_market": "", "is_a_share": false, "source": "", "url": "https://news.10jqka.com.cn/20260327/c675590895.shtml"}, {"id": "4153977", "title": "国网英大：国网英大集团拟无偿划转公司9.79%股份给中国石油集团", "content": "国网英大公告，国网英大国际控股集团有限公司拟通过国有股份无偿划转方式将其持有的国网英大股份有限公司5.6亿股A股股份（占公司总股本的9.79%）划转给中国石油天然气集团有限公司。", "ctime": 1774596869, "time_str": "15:34:29", "stock_code": "", "stock_name": "", "stock_market": "", "is_a_share": false, "source": "", "url": "https://news.10jqka.com.cn/20260327/c675590871.shtml"}, {"id": "4153975", "title": "外交部：敦促美方彻查中国博士后遭美方约谈盘问后自杀身亡案", "content": "据了解，近期一名中国博士后在遭美方执法人员约谈盘问之后，于次日不幸自杀身亡。外交部发言人林剑3月27日在例行记者会上答问时表示，中方对这一悲剧深感痛心，已向美方提出严正交涉。中国驻美使领馆已第一时间同当事人家属取得联系，并为家属善后提供积极协助。林剑说，一段时间来，美方泛化国家安全概念进行政治操弄，无端盘查滋扰中国学生学者，侵犯中国公民正当合法权益，破坏正常中美人文交流氛围，制造了严重的“寒蝉效应”。他说，中方敦促美方彻查此案，向受害者家属和中方作出负责任交代，停止针对在美中国学生学者的歧视性执法，停止炮制各种冤假错案。“我们将继续采取必要措施，坚定维护中国公民的正当合法权益。”(新华社)", "ctime": 1774596864, "time_str": "15:34:24", "stock_code": "", "stock_name": "", "stock_market": "", "is_a_share": false, "source": "", "url": "https://news.10jqka.com.cn/20260327/c675590866.shtml"}, {"id": "4153971", "title": "银龙股份：控股股东谢志峰质押4.23%股份", "content": "银龙股份公告，控股股东、实际控制人谢志峰本次质押3685万股，占其所持股份19.97%、占公司总股本4.23%。谢志峰持股1.85亿股，占21.17%。质押日为2026年3月25日，质权人为中国银行股份有限公司，资金用途为生产经营。本次质押后，谢志峰及一致行动人合计质押股份3685万股，占三人合计持股18.06%，占总股本4.23%。", "ctime": 1774596842, "time_str": "15:34:02", "stock_code": "", "stock_name": "", "stock_market": "", "is_a_share": false, "source": "", "url": "https://news.10jqka.com.cn/20260327/c675590848.shtml"}, {"id": "4153969", "title": "外交部：再次敦促日方尽快彻查，并给中方一个负责任的交代", "content": "外交部发言人林剑主持3月27日例行记者会。会上环球时报-环球网记者提问：日本防卫大臣在27日的记者会上表示，作为实力组织的自卫队，维持纪律极为重要。本应遵守法律与纪律的自卫官却侵入中国大使馆内，因涉嫌入侵建筑物而被逮捕，对此深感遗憾。同时有日本媒体报道称，该人员没有伤人意图。请问此事件有何最新进展？林剑在回应环球时报-环球网记者提问时表示，越来越多的事实已经浮出水面，该不法分子为自卫队的少尉官员，选择使馆的通勤时间，携带长达31厘米的锋利刀具，非法翻墙闯入中国使馆，并长时间潜伏在树丛中。我们不禁要问他长时间潜伏是在等什么人？打算做什么？日方迄今对此完全没有说明。林剑表示，日本右翼分子听闻此事件之初，还想为该不法之徒洗白身份，认为不可能是自卫队官员，而事实狠狠地打了他们的脸。日方已向中方就此事件表示非常遗憾，但这远远不够。我们再次敦促日方尽快彻查，并给中方一个负责任的交代。(环球网)", "ctime": 1774596837, "time_str": "15:33:57", "stock_code": "", "stock_name": "", "stock_market": "", "is_a_share": false, "source": "", "url": "https://news.10jqka.com.cn/20260327/c675590846.shtml"}, {"id": "4153965", "title": "美官员称中芯国际已向伊朗军方提供芯片制造工具，外交部回应", "content": "美国政府两名高级官员26日表示，中国芯片制造商中芯国际已向伊朗军方提供了芯片制造工具。一名官员表示，相关进程大约一年前已开始。对于上述消息，在3月27日举行的中国外交部例行记者会上，外交部发言人林剑在回应外媒记者“中方对此有何评论”的提问时表示，我不了解你提到的情况，我可以告诉你的是，最近个别媒体热衷发布一些似是而非的消息，我们核实后发现都是假消息。(环球网)", "ctime": 1774596813, "time_str": "15:33:33", "stock_code": "", "stock_name": "", "stock_market": "", "is_a_share": false, "source": "", "url": "https://news.10jqka.com.cn/20260327/c675590833.shtml"}, {"id": "4153925", "title": "韩国总统李在明召开全军会议强调加速收回战时指挥权", "content": "韩国总统李在明当地时间3月27日在国防部主持召开全军主要指挥官会议时表示，“应对急剧变化的安保环境，自主国防必不可少”，并强调“将尽快推进收回战时作战指挥权”。这是李在明当选后，首次主持全军主要指挥官会议。李在明表示，虽然“要基于韩美同盟，维持强有力的联合防卫态势”，但“过度依赖是不可取的”，“必须做好万全准备，使韩国军队能够发挥主导作用”。他希望军方“怀揣着依靠自身力量的使命感与决心”，强调这种心态才是“加速收回作战权的关键”。(央视新闻)", "ctime": 1774596390, "time_str": "15:26:30", "stock_code": "", "stock_name": "", "stock_market": "", "is_a_share": false, "source": "", "url": "https://news.10jqka.com.cn/20260327/c675590591.shtml"}, {"id": "4153917", "title": "据港交所文件：山金国际黄金股份有限公司向港交所提交上市申请书", "content": "据港交所文件：山金国际黄金股份有限公司向港交所提交上市申请书。", "ctime": 1774596229, "time_str": "15:23:49", "stock_code": "", "stock_name": "", "stock_market": "", "is_a_share": false, "source": "", "url": "https://news.10jqka.com.cn/20260327/c675590550.shtml"}, {"id": "4153907", "title": "中远海运集运旗下两艘集装箱船已向波斯湾方向折返 暂未通过霍尔木兹海峡", "content": "记者查询船舶AIS数据获悉，于北京时间今天上午向霍尔木兹海峡靠近的中远海运集运旗下两艘集装箱船“中海北冰洋”、“中海印度洋”，当前已向波斯湾方向折返，暂未通过霍尔木兹海峡。（财联社）", "ctime": 1774596070, "time_str": "15:21:10", "stock_code": "", "stock_name": "", "stock_market": "", "is_a_share": false, "source": "", "url": "https://news.10jqka.com.cn/20260327/c675590476.shtml"}, {"id": "4153897", "title": "美国再次发生军机险些撞客机事件", "content": "美国联邦航空局26日表示，正对本周发生的一起美军“黑鹰”直升机在加利福尼亚州上空与一架波音客机“几乎相撞”的事件进行调查。 综合媒体报道，美国联合航空公司589次航班当地时间24日约20时40分准备降落在加州奥兰治县约翰·韦恩机场时，一架“黑鹰”直升机从其飞行路径正前方穿过。该航班收到警报时，两机仅相距数百英尺（1英尺约合0.3048米）。这架波音737－800型客机被迫改为平飞来应对险情，机上当时有162名乘客和6名机组成员。 加州国民警卫队在一份声明中说，这架直升机隶属于洛斯阿拉米托斯联合部队训练基地，事发时正在执行“例行训练任务”。美国陆军发表声明称，已注意到这起涉及加州国民警卫队“黑鹰”直升机的事件，并正与联邦航空局协调以获取更多细节。 2025年1月29日晚，美国太平洋西南航空公司一架载有64人的庞巴迪喷气式客机在华盛顿里根国家机场降落过程中，与一架载有3名军人的陆军“黑鹰”直升机相撞，两机随后坠入波托马克河。事故中没有幸存者。据美媒报道，这起事故是1982年以来华盛顿最严重的航空事故。此后，美国又发生数起军机与客机险些相撞事件。(新华社)", "ctime": 1774596005, "time_str": "15:20:05", "stock_code": "", "stock_name": "", "stock_market": "", "is_a_share": false, "source": "", "url": "https://news.10jqka.com.cn/20260327/c675590389.shtml"}, {"id": "4153865", "title": "上期所贵金属及有色金属仓单日报：白银、铝仓单增加", "content": "3月27日，上期所贵金属及有色金属仓单及变化数据：\n铜期货仓单237076吨，环比上个交易日减少9365吨；\n铝期货仓单408197吨，环比上个交易日增加3455吨；\n锌期货仓单95760吨，环比上个交易日减少1632吨；\n铅期货仓单52463吨，环比上个交易日减少404吨；\n镍期货仓单57069吨，环比上个交易日减少524吨；\n锡期货仓单7404吨，环比上个交易日减少353吨；\n氧化铝期货仓库仓单414074吨，环比上个交易日增加1506吨；\n氧化铝期货厂库仓单2700吨，环比上个交易日持平；\n黄金期货仓单106644千克，环比上个交易日减少99千克；\n白银期货仓单371799千克，环比上个交易日增加1500千克；\n国际铜期货仓单13358吨，环比上个交易日减少50吨。", "ctime": 1774595561, "time_str": "15:12:41", "stock_code": "", "stock_name": "", "stock_market": "", "is_a_share": false, "source": "", "url": "https://news.10jqka.com.cn/20260327/c675589963.shtml"}, {"id": "4153861", "title": "春假多个景区对中小学生免票 多个景区打响春假中小学生争夺战", "content": "记者统计发现，四川省的130多家景区，也都先后推出了春假中小学生免票等优惠政策，其中包括青城山-都江堰、光雾山、碧峰峡、海螺沟、剑门关等多家5A级景区。江苏的南京、苏州等地，则针对7—16周岁的中小学生推出免费乘车活动：凭学生证、户口本、身份证可免费乘坐公交、地铁、轮渡、有轨电车等公共交通。浙江的千岛湖、台州神仙居、温州雁荡山、嘉兴盐官古城等景区，则先后推出了春假期间学生免门票政策。多个在线旅游平台的报告亦显示，得益于春假的衔接，即将到来的清明小长假有望成为一个火热的“清明黄金周”。其中，旅游出行平台的数据显示，4月1号到6号，国内航线机票预订量超过225万张，同比增长约25%。其中，亲子游的搜索量增长超过1.2倍，4月1号到6号购买景区门票的用户中，13~18岁的游客增长了3.3倍。（第一财经）", "ctime": 1774595480, "time_str": "15:11:20", "stock_code": "", "stock_name": "", "stock_market": "", "is_a_share": false, "source": "", "url": "https://news.10jqka.com.cn/20260327/c675589936.shtml"}, {"id": "4153839", "title": "俄外长：美谋求全球能源市场主导地位", "content": "当地时间3月26日，俄罗斯外交部长拉夫罗夫表示，美国表现出对全球能源市场的兴趣，其官方文件和官员表态均明确表示要谋求全球能源市场主导地位。谈到“北溪”天然气管道遭破坏事件，拉夫罗夫表示，在西方情报部门明显支持下，乌克兰破坏分子炸毁了管道。法国、德国对此均未予以谴责，美国现在也表示想要“接管”北溪管道。俄罗斯卢克石油公司和俄罗斯石油公司的海外业务正面临被掠夺性侵占的企图。拉夫罗夫强调，无论经济形势如何，俄方将始终履行自身义务，并与遵循同样原则的伙伴保持关系。（央视新闻）", "ctime": 1774595296, "time_str": "15:08:16", "stock_code": "", "stock_name": "", "stock_market": "", "is_a_share": false, "source": "", "url": "https://news.10jqka.com.cn/20260327/c675589863.shtml"}, {"id": "4153831", "title": "菲律宾总统：东盟峰会将于5月上旬如期举行", "content": "据菲律宾通讯社27日报道，菲总统马科斯当天称，第48届东盟峰会及系列会议将于5月8日至9日在菲律宾中部宿务省举行。 马科斯当天在甲米地省锡朗市接受媒体采访时说，尽管与中东战事相关的石油危机仍在持续，但与其他东南亚国家领导人磋商后，决定东盟峰会将如期举行。 他表示，此次东盟峰会及系列会议将缩减规模，讨论当前挑战和集体应对措施，主要议题包括石油和石油产品的供应、食品的供应和价格、流动务工人员等。 2026年，菲律宾担任东盟轮值主席国。(新华社)", "ctime": 1774595254, "time_str": "15:07:34", "stock_code": "", "stock_name": "", "stock_market": "", "is_a_share": false, "source": "", "url": "https://news.10jqka.com.cn/20260327/c675589836.shtml"}, {"id": "4153817", "title": "腾讯云与上海市普陀区签署战略合作协议", "content": "3月27日，在腾讯云上海城市峰会现场，腾讯云与上海市普陀区人民政府正式签署战略合作框架协议。双方将围绕普陀区“1+2+3”为主体的现代化产业体系与数字化转型目标，深化在云计算、人工智能、大数据等领域的合作，共同推动区域产业集群建设及数字经济高质量发展。（腾讯云）", "ctime": 1774595110, "time_str": "15:05:10", "stock_code": "", "stock_name": "", "stock_market": "", "is_a_share": false, "source": "", "url": "https://news.10jqka.com.cn/20260327/c675589791.shtml"}, {"id": "4153803", "title": "小摩：上调中海油目标价至33港元，上调盈利预测", "content": "摩根大通发表研报指，中海油2025年第四季净利润为200亿元，低于该行及市场预期的260亿元及290亿元，主要因减值幅度高于预期，以及新项目投产导致综合成本轻微增加。计入油价预测后，该行将中海油2026至2028年每股盈利预测上调9%至11%，目标价由31港元上调至33港元；基于中海油纯上游业务的敞口，维持“增持”评级。另外，中石油仍是该行首选股份。（新浪财经）", "ctime": 1774594984, "time_str": "15:03:04", "stock_code": "", "stock_name": "", "stock_market": "", "is_a_share": false, "source": "", "url": "https://news.10jqka.com.cn/20260327/c675589721.shtml"}, {"id": "4153797", "title": "我国大力发展数字消费，2025年居民数字消费规模达25.3万亿元", "content": "2025年，我国居民数字消费规模达25.3万亿元，同比增长8.7%，其中数字服务消费增长12.5%，成为拉动数字消费增长主引擎。电商带动线下消费更加活跃，线下数字消费增长13.8%。为贯彻落实党中央、国务院决策部署，2025年8月，商务部等8部门印发《关于大力发展数字消费共创数字时代美好生活的指导意见》。各地各部门高度重视、协同发力，相关部门出台配套文件及标准规范40余项。数字技术深度融入文旅、医疗、城市服务等领域，沉浸式文旅、智能诊疗、无人机配送等新场景广泛落地，数字治理、数据安全、知识产权等领域制度不断完善，助力构建安全规范、健康包容的数字消费生态。下一步，商务部将持续深化部门协同，聚焦优化供给、拓展场景、完善支撑、规范环境，推动数字消费提质扩容增效，更好服务构建新发展格局、助力高质量发展。（商务部）", "ctime": 1774594969, "time_str": "15:02:49", "stock_code": "", "stock_name": "", "stock_market": "", "is_a_share": false, "source": "", "url": "https://news.10jqka.com.cn/20260327/c675589719.shtml"}, {"id": "4153789", "title": "期货收评：碳酸锂盘中逼近17万关口，纯苯涨超6%", "content": "期货收评：截止收盘，大宗商品以上涨为主。涨幅方面，纯苯、碳酸锂涨超6%，苯乙烯、乙二醇涨超5%，甲醇涨超4%，PX、PTA、短纤、瓶片涨超3%。跌幅方面，集运欧线跌超3%，烧碱、沪银跌超2%。", "ctime": 1774594939, "time_str": "15:02:19", "stock_code": "", "stock_name": "", "stock_market": "", "is_a_share": false, "source": "", "url": "https://news.10jqka.com.cn/20260327/c675589704.shtml"}, {"id": "4153779", "title": "宁夏吴忠市委原常委、政府原副市长王海宁受贿一审被判十年三个月", "content": "宁夏回族自治区石嘴山市中级人民法院一审公开宣判吴忠市委原常委、政府原副市长王海宁受贿案，对被告人王海宁以受贿罪判处有期徒刑十年三个月，并处罚金人民币五十万元，对退缴的受贿犯罪所得依法上缴国库。经审理查明，2013年至2025年，被告人王海宁利用担任宁夏回族自治区吴忠太阳山开发区管理委员会（原吴忠市太阳山移民开发区管委会）副主任、主任，盐池县县长，盐池县委书记等职务上的便利及其职权或者地位形成的便利条件，为相关企业和个人在项目承揽、工程款拨付等方面谋取利益，非法收受他人财物折合人民币共计503.47万元。石嘴山市中级人民法院认为，被告人王海宁的行为构成受贿罪，受贿数额特别巨大，应依法惩处。鉴于其到案后如实供述罪行，主动交代办案机关尚未掌握的部分受贿事实，认罪悔罪，退缴了全部赃款，具有法定、酌定从宽处罚情节，依法可对其从轻处罚。法庭遂作出上述判决。(新华社)", "ctime": 1774594902, "time_str": "15:01:42", "stock_code": "", "stock_name": "", "stock_market": "", "is_a_share": false, "source": "", "url": "https://news.10jqka.com.cn/20260327/c675589699.shtml"}, {"id": "4153767", "title": "ETF收评：科创创新药ETF领涨6.70%，标普油气ETF领跌2.17%", "content": "ETF收盘涨跌不一，科创创新药ETF（589120）领涨6.70%，科创创新药ETF（589720）涨6.55%，港股创新药ETF（520690）涨6.17%，标普油气ETF（513350）领跌2.17%，豆粕ETF（159985）跌1.8%，通信ETF（159994）跌1.34%。", "ctime": 1774594900, "time_str": "15:01:40", "stock_code": "", "stock_name": "", "stock_market": "", "is_a_share": false, "source": "", "url": "https://news.10jqka.com.cn/20260327/c675589695.shtml"}, {"id": "4153747", "title": "ETF两市成交额4812.34亿元", "content": "截至收盘，ETF两市成交额报4812.34亿元，分类型来看，股票型ETF成交额1174亿元，债券型ETF成交额2099.97亿元，货币型ETF成交额383.52亿元，商品型ETF成交额209.54亿元，QDII型ETF成交额596.21亿元。其中，成交额最高的非货币型ETF分别是广发中证香港创新药(qdii-ETF)（513120）、嘉实标普石油天然气勘探及生产精选行业ETF(qdii)（159518）、华泰柏瑞中证a500ETF（563360），成交额分别为80.38亿元、79.27亿元、70.12亿元。", "ctime": 1774594861, "time_str": "15:01:01", "stock_code": "", "stock_name": "", "stock_market": "", "is_a_share": false, "source": "", "url": "https://news.10jqka.com.cn/20260327/c675589679.shtml"}, {"id": "4153749", "title": "A股收评：深成指低开高走涨超1% 创新药、锂电新能源板块集体走强", "content": "A股三大指数今日集体上涨，截至收盘，上证指数涨0.63%，深成指涨1.13%，创业板指涨0.71%，北证50指数涨0.37%，沪深京三市成交额18638亿元，较上日缩量932亿元，三市超4300只个股上涨。 板块题材上，创新药、能源金属、化肥、贵金属、电池、乳业、环氧丙烷板块涨幅居前；保险、银行、电力、煤炭开采加工、港口航运、风电设备板块表现落后。盘面上，2026年中国创新药出海BD延续强劲，行业盈利拐点全面确定，相关板块今日大涨，舒泰神、信立泰、联环药业等10余股涨停。中东局势推动新能源快速渗透，锂矿、电池产业链全线走高，赣锋锂业、海科新源、石大胜华多股封板。全球化肥贸易流动受中东战争影响几近中断，六国化工、赤天化等多股收获涨停。另一方面，保险板块延续调整，中国人保、中国人寿下挫。近期持续上涨的电力板块因回调需求出现分化，湖南发展、浙江新能、粤电力A等部分个股下跌。", "ctime": 1774594860, "time_str": "15:01:00", "stock_code": "", "stock_name": "", "stoc 、立法等领域高水平合作，加强交流互鉴，增进民心相通，携手推进各自现代化进程，共同维护国际公平正义，为地区和世界和平繁荣作出更大贡献。黄循财表示，新方坚定奉行一个中国政策，反对“台独”。愿深化经济、自贸港建设、新兴领域、立法、人文等领域合作，惠及两国人民。(外交部网站)", "ctime": 1774593537, "time_str": "14:38:57", "stock_code": "", "stock_name": "", "stock_market": "", "is_a_share": false, "source": "", "url": "https://news.10jqka.com.cn/20260327/c675589386.shtml"}, {"id": "4153585", "title": "体育产业板块异动拉升，舒华体育涨停", "content": "体育产业板块异动拉升，舒华体育涨停，金陵体育、中体产业、共创草坪、粤传媒、力盛体育跟涨。消息面上，金陵体育3月26日在机构调研中表示，国家政策对体育产业支持力度很大，体育产业的发展态势趋好，中国体育产业的快速发展是个长期趋势。", "ctime": 1774593441, "time_str": "14:37:21", "stock_code": "", "stock_name": "", "stock_market": "", "is_a_share": false, "source": "", "url": "https://news.10jqka.com.cn/20260327/c675589372.shtml"}, {"id": "4153567", "title": "伊朗总统：伊朗将继续进行正当且有力的防御", "content": "据伊朗伊斯兰共和国通讯社26日报道，伊朗总统佩泽希齐扬在与伊拉克总统拉希德的通话中强调，伊朗决心继续进行正当且有力的防御，以应对一切侵略行为。报道说，佩泽希齐扬与拉希德在通话中就美国和以色列对伊朗发动军事打击以来的地区局势交换了意见。佩泽希齐扬表示，伊朗有权对作为侵略源头的美国在该地区的军事基地实施正当防御，并呼吁对“美以试图通过武装力量和利用恐怖组织、借助邻国领土入侵伊朗，从而在伊斯兰国家间制造分裂和动荡”的阴谋保持警惕。(新华社)", "ctime": 1774593317, "time_str": "14:35:17", "stock_code": "", "stock_name": "", "stock_market": "", "is_a_share": false, "source": "", "url": "https://news.10jqka.com.cn/20260327/c675589345.shtml"}, {"id": "4153549", "title": "电力板块再度拉升，宁波能源、豫能控股尾盘涨停", "content": "电力板块再度拉升，宁波能源、豫能控股尾盘涨停，梅雁吉祥、世茂能源、廊坊发展跟涨。", "ctime": 1774593152, "time_str": "14:32:32", "stock_code": "", "stock_name": "", "stock_market": "", "is_a_share": false, "source": "", "url": "https://news.10jqka.com.cn/20260327/c675589305.shtml"}, {"id": "4153537", "title": "日韩股市集体收跌", "content": "日经225指数收跌0.43%，报53373.07点。韩国综指收跌0.40%，报5438.85点。", "ctime": 1774593090, "time_str": "14:31:30", "stock_code": "", "stock_name": "", "stock_market": "", "is_a_share": false, "source": "", "url": "https://news.10jqka.com.cn/20260327/c675589290.shtml"}, {"id": "4153525", "title": "以军称打击伊朗弹道导弹生产基地和防空系统", "content": "当地时间3月27日上午，以色列国防军发表声明称，以军连夜袭击了伊朗境内的弹道导弹生产基地和防空系统。声明称，在针对伊朗首都德黑兰的空袭中，以军对伊朗用于生产武器的基础设施进行了打击，重点打击其弹道导弹的生产基地。声明还表示，在针对伊朗西部的空袭中，以军打击了 function updateMarketStatus() {
  const el = document.getElementById('market-status');
  const now = new Date();
  const bjHour = (now.getUTCHours() + 8) % 24;
  const bjMin = now.getUTCMinutes();
  const t = bjHour * 100 + bjMin;
  const day = (now.getUTCDay() + (now.getUTCHours() + 8 >= 24 ? 1 : 0)) % 7;
  if (day === 0 || day === 6) {
    el.innerHTML = '<span class="badge" style="background:rgba(100,116,139,0.2);color:#94a3b8">休市</span>';
  } else if (t >= 930 && t <= 1130 || t >= 1300 && t <= 1500) {
    el.innerHTML = '<span class="badge" style="background:rgba(34,197,94,0.2);color:#22c55e"><span class="pulse">●</span>&nbsp;交易中</span>';

    el.innerHTML = '<span class="badge" style="background:rgba(245,158,11,0.2);color:#f59e0b">集合竞价</span>';
  } else {

  const hotSector = SECTORS.length > 0 ? SECTORS[0].name : '-';

  const kpis = [
    { label: '市场情绪', value: sentimentScore.toFixed(0), unit: '分', color: sentimentScore >= 60 ? '#ef4444' : sentimentScore >= 40 ? '#f59e0b' : '#22c55e' },
    { label: '精选个股', value: pickCount, unit: '只', color: '#3b82f6' },
    { label: '最高评分', value: topScore.toFixed(1), unit: '分', color: topScore >= 80 ? '#ef4444' : '#f59e0b' },
    { label: '热门板块', value: hotSector, unit: '', color: '#8b5cf6' },
  ];

  container.innerHTML = kpis.map(k => `
    <div class="card glow" style="border-left: 3px solid ${k.color}">
      <p class="text-xs text-gray-500 mb-1">${k.label}</p>
      <p class="text-2xl font-bold mono" style="color:${k.color}">${k.value}<span class="text-sm text-gray-500 ml-1">${k.unit}</span></p>
    </div>
  `).join('');
}

// Hot7
function renderHot7() {
  const container = document.getElementById('hot7-list');
  if (!HOT7 || HOT7.length === 0) {
    container.innerHTML = '<p class="text-gray-600 text-sm">暂无数据</p>';
    return;
  }
  container.innerHTML = HOT7.map((item, i) => `
    <div class="flex items-center gap-3 py-2 ${i < HOT7.length - 1 ? 'border-b border-gray-800' : ''}">
      <span class="w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold
        ${i < 3 ? 'bg-red-500/20 text-red-400' : 'bg-gray-700 text-gray-400'}">${i+1}</span>
      <div class="flex-1 min-w-0">
        <p class="text-sm font-medium truncate">${item.name || item.symbol}</p>
        <p class="text-xs text-gray-500 mono">${item.symbol}</p>
      </div>
      <span class="text-xs text-gray-400">${item.mentions}次提及</span>
    </div>
  `).join('');
}

// 精选个股
function renderPicks() {
  const tbody = document.getElementById('picks-table');
  if (!PICKS || PICKS.length === 0) {
    tbody.innerHTML = '<tr><td colspan="8" class="text-center text-gray-600 py-8">暂无符合条件的个股</td></tr>';
    return;
  }
  tbody.innerHTML = PICKS.map(p => {
    const dims = [
      { name: '情绪', val: p.sentiment, w: 25 },
      { name: '板块', val: p.sector, w: 20 },
      { name: '龙头', val: p.leader, w: 20 },
      { name: '资金', val: p.fund, w: 15 },
      { name: '量价', val: p.vp, w: 10 },
      { name: '封单', val: p.seal, w: 10 },
    ];
    const miniBar = dims.map(d => {
      const pct = (d.val / 100 * d.w).toFixed(1);
      return `<div class="flex items-center gap-1" title="${d.name}: ${d.val.toFixed(0)}">
        <span class="text-gray-600" style="font-size:9px;width:18px">${d.name.substring(0,2)}</span>
        <div class="score-bar flex-1"><div class="score-bar-fill" style="width:${d.val}%;background:${barColor(d.val)}"></div></div>
      </div>`;
    }).join('');
    return `<tr class="border-b border-gray-800/50 hover:bg-gray-800/30">
      <td class="py-2.5 px-2 mono text-xs text-gray-400">${p.symbol}</td>
      <td class="py-2.5 px-1 font-medium text-sm">${p.name}</td>
      <td class="py-2.5 px-1 text-right mono text-sm">${p.price.toFixed(2)}</td>
      <td class="py-2.5 px-1 text-right mono text-sm ${pctClass(p.pct)}">${pctStr(p.pct)}</td>
      <td class="py-2.5 px-1 text-right">${impactBadge(p.total)} <span class="mono text-sm ml-1">${p.total.toFixed(1)}</span></td>
      <td class="py-2.5 px-1"><div class="space-y-0.5">${miniBar}</div></td>
      <td class="py-2.5 px-1 text-right text-xs text-gray-400">${p.sector_name || '-'}</td>
      <td class="py-2.5 px-1 text-right mono text-xs ${p.consecutive_ups >= 3 ? 'text-red-400' : 'text-gray-400'}">${p.consecutive_ups || 0}天</td>
    </tr>`;
  }).join('');
}

// 板块热度图
function renderSectorChart() {
  if (!SECTORS || SECTORS.length === 0) return;
  const chart = echarts.init(document.getElementById('sector-chart'), null, { renderer: 'svg' });
  const names = SECTORS.map(s => s.name);
  const counts = SECTORS.map(s => s.hit_count);
  chart.setOption({
    backgroundColor: 'transparent',
    grid: { left: 80, right: 20, top: 10, bottom: 30 },
    xAxis: { type: 'value', axisLine: { lineStyle: { color: '#1e293b' } }, axisLabel: { color: '#64748b', fontSize: 11 }, splitLine: { lineStyle: { color: '#1e293b' } } },
    yAxis: { type: 'category', data: names.reverse(), axisLine: { lineStyle: { color: '#1e293b' } }, axisLabel: { color: '#94a3b8', fontSize: 12 } },
    series: [{
      type: 'bar', data: counts.reverse(), barWidth: 18,
      itemStyle: { borderRadius: [0, 4, 4, 0],
        color: new echarts.graphic.LinearGradient(0, 0, 1, 0, [
          { offset: 0, color: '#3b82f6' }, { offset: 1, color: '#8b5cf6' }
        ])
      },
      label: { show: true, position: 'right', color: '#94a3b8', fontSize: 11 }
    }],
    tooltip: { trigger: 'axis', backgroundColor: '#1e293b', borderColor: '#334155', textStyle: { color: '#e2e8f0' } }
  });
  window.addEventListener('resize', () => chart.resize());
}

// 新闻流
function renderNews() {
  const container = document.getElementById('news-feed');
  const items = (NEWS || []).slice(0, 30);
  if (items.length === 0) {
    container.innerHTML = '<p class="text-gray-600 text-sm">暂无新闻</p>';
    return;
  }
  container.innerHTML = items.map(n => {
    const stockTag = n.stock_name ? `<span class="text-xs text-blue-400 ml-2">${n.stock_name}</span>` : '';
    return `<div class="py-2 border-b border-gray-800/50">
      <div class="flex items-start gap-2">
        <span class="mono text-xs text-gray-600 mt-0.5 shrink-0">${n.time_str || ''}</span>
        <p class="text-sm text-gray-300 leading-relaxed">${n.title}${stockTag}</p>
      </div>
    </div>`;
  }).join('');
}

// 交易代理状态
function renderAgentStatus() {
  const container = document.getElementById('agent-status');
  const stateColors = {
    'IDLE': '#64748b', 'OBSERVE': '#f59e0b', 'READY': '#3b82f6',
    'HOLD': '#ef4444', 'EXIT': '#22c55e'
  };
  const agents = META.agents || [];
  if (agents.length === 0) {
    container.innerHTML = '<p class="text-gray-600 text-sm">无活跃交易代理</p>';
    return;
  }
  container.innerHTML = agents.map(a => `
    <div class="flex items-center justify-between py-2 border-b border-gray-800/50">
      <div class="flex items-center gap-3">
        <span class="w-2 h-2 rounded-full" style="background:${stateColors[a.state] || '#64748b'}"></span>
        <div>
          <span class="text-sm font-medium">${a.name || a.symbol}</span>
          <span class="mono text-xs text-gray-500 ml-2">${a.symbol}</span>
        </div>
      </div>
      <div class="flex items-center gap-3">
        <span class="badge" style="background:${stateColors[a.state]}22;color:${stateColors[a.state]}">${a.state}</span>
        <span class="mono text-xs text-gray-400">评分 ${a.score}</span>
      </div>
    </div>
  `).join('');
}

// 倒计时
let nextRefresh = 180;
function updateCountdown() {
  nextRefresh--;
  if (nextRefresh <= 0) {
    location.reload();
    return;
  }
  document.getElementById('countdown').textContent = `刷新 ${nextRefresh}s`;
}

// 初始化
updateMarketStatus();
renderKPI();
renderHot7();
renderPicks();
renderSectorChart();
renderNews();
renderAgentStatus();
setInterval(updateCountdown, 1000);
setInterval(updateMarketStatus, 30000);
</script>
</body>
</html>
